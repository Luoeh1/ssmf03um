<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>药品详情</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.detail-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }

		.breadcrumb { margin-bottom: 25px; font-size: 15px; color: #64748b; display: flex; align-items: center; }
		.breadcrumb a { color: #475569; text-decoration: none; transition: color 0.3s; }
		.breadcrumb a:hover { color: #008476; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		/* 上半部：纯文字信息卡片优化 */
		.info-block {
			background: #ffffff; border-radius: 20px; padding: 40px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); margin-bottom: 30px;
			border-top: 4px solid #008476; /* 顶部主题色边框增加质感 */
		}

		.text-area { width: 100%; }
		.main-title { font-size: 30px; color: #1e293b; font-weight: bold; margin: 0 0 20px 0; }

		.price-wrap {
			background: #fef2f2; padding: 20px 25px; border-radius: 12px; margin-bottom: 30px; display: flex; align-items: baseline;
		}
		.price-label { font-size: 15px; color: #ef4444; margin-right: 10px; }
		.price-val { font-size: 36px; color: #ef4444; font-weight: bold; }

		/* 属性网格布局，由于没有图片，改为两列显示更饱满 */
		.attr-grid {
			display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
			background: #f8fafc; border-radius: 12px; padding: 25px; margin-bottom: 30px;
		}
		.attr-item { display: flex; font-size: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
		.attr-item .label { color: #64748b; width: 100px; flex-shrink: 0; }
		.attr-item .val { color: #334155; font-weight: 500; }

		/* 操作区 */
		.action-area { display: flex; gap: 20px; justify-content: flex-start; }
		.btn-primary {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 40px;
			height: 50px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer;
			transition: all 0.3s; display: flex; align-items: center;
		}
		.btn-primary:hover { transform: translateY(-2px); opacity: 0.9; color: white; }

		.btn-warning {
			background: #ffffff; color: #008476; border: 2px solid #008476; padding: 0 40px;
			height: 50px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer;
			transition: all 0.3s; display: flex; align-items: center;
		}
		.btn-warning:hover { background: #f0fdfa; transform: translateY(-2px); }

		/* 下半部：您要求的选项卡布局 */
		.detail-tab-wrap { background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); }
		.layui-tab-card { border: none; margin: 0; }
		.layui-tab-title { background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; }
		.layui-tab-title .layui-this { color: #008476 !important; font-weight: bold; }
		.layui-tab-title .layui-this:after { border-bottom-color: #008476 !important; }

		.rich-text-content { font-size: 16px; line-height: 2; color: #334155; padding: 20px 10px; }
		.rich-text-content img { max-width: 100%; border-radius: 8px; }

		@media (max-width: 768px) {
			.attr-grid { grid-template-columns: 1fr; }
			.action-area { flex-direction: column; }
		}
	</style>
</head>
<body>
<div id="app" class="detail-container">

	<div class="breadcrumb">
		<a href="javascript:window.history.back();"><i class="layui-icon layui-icon-left"></i> 返回药品列表</a>
		<span>/</span> 药品详情
	</div>

	<div class="info-block">
		<div class="text-area">
			<h1 class="main-title">{{detail.yaopinmingcheng}}</h1>

			<div class="price-wrap" v-if="detail.feiyong">
				<span class="price-label">零售价</span>
				<span class="price-val">￥{{detail.feiyong}}</span>
			</div>

			<div class="attr-grid">
				<div class="attr-item" v-if="detail.yaopinfenlei">
					<div class="label">药品分类</div>
					<div class="val">{{detail.yaopinfenlei}}</div>
				</div>
				<div class="attr-item" v-if="detail.guige">
					<div class="label">包装规格</div>
					<div class="val">{{detail.guige}}</div>
				</div>
				<div class="attr-item" v-if="detail.shengchanshang">
					<div class="label">生产厂商</div>
					<div class="val">{{detail.shengchanshang}}</div>
				</div>
				<div class="attr-item" v-if="detail.shengchanriqi">
					<div class="label">生产日期</div>
					<div class="val">{{detail.shengchanriqi}}</div>
				</div>
				<div class="attr-item" v-if="detail.youxiaoqi">
					<div class="label">有效期至</div>
					<div class="val" style="color: #ef4444;">{{detail.youxiaoqi}}</div>
				</div>
				<div class="attr-item" v-if="detail.shuliang">
					<div class="label">当前库存</div>
					<div class="val">{{detail.shuliang}} {{detail.guige}}</div>
				</div>
			</div>

			<div class="action-area">
				<button v-if="isAuth('yaopinxinxi','购买')" @click="onAcrossTap('dingdanxinxi','','','')" type="button" class="btn-primary">
					<i class="layui-icon layui-icon-cart" style="margin-right: 8px;"></i> 立即购买药品
				</button>
				<button v-if="isAuth('yaopinxinxi','预约药品')" @click="onAcrossTap('yuyueyaopin','','','')" type="button" class="btn-warning">
					<i class="layui-icon layui-icon-form" style="margin-right: 8px;"></i> 预约登记
				</button>
			</div>
		</div>
	</div>

	<div class="detail-tab-wrap">
		<div class="layui-tab layui-tab-card">
			<ul class="layui-tab-title">
				<li class="layui-this">详细介绍 / 药品说明</li>
			</ul>
			<div class="layui-tab-content">
				<div class="layui-tab-item layui-show">
					<div class="rich-text-content" v-html="detail.xiangxijieshao || '暂无详细介绍内容'"></div>
				</div>
			</div>
		</div>
	</div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: { id: 0 },
			detailTable: 'yaopinxinxi',
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			isAuth(tablename, button) { return isFrontAuth(tablename, button) },
			onAcrossTap(tableName, crossOptAudit, statusColumnName, tips, statusColumnValue) {
				localStorage.setItem('crossTable', `yaopinxinxi`);
				localStorage.setItem('crossObj', JSON.stringify(this.detail));
				localStorage.setItem('statusColumnName', statusColumnName);
				localStorage.setItem('statusColumnValue', statusColumnValue);
				localStorage.setItem('tips', tips);
				jump(`../${tableName}/add.html?corss=true`);
			},
		}
	});

	layui.use(['layer', 'http', 'jquery', 'element'], function() {
		var layer = layui.layer;
		var http = layui.http;
		var jquery = layui.jquery;
		var element = layui.element; // 必须引入 element 模块使 Tab 生效

		var id = http.getParam('id');
		vue.detail.id = id;
		vue.baseurl = http.baseurl;

		http.request(`${vue.detailTable}/detail/` + id, 'get', {}, function(res) {
			vue.detail = res.data;

			// 富文本图片路径修复（针对刚才添加的 xiangxijieshao 字段）
			if(vue.detail.xiangxijieshao) {
				vue.detail.xiangxijieshao = vue.detail.xiangxijieshao.replace(/src="upload\//g, 'src="' + vue.baseurl + 'upload/');
			}
		});
	});
</script>
</body>
</html>
