<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>发布/编辑诊疗</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		/* 居中宽体表单容器 */
		.add-container {
			max-width: 850px; margin: 40px auto; background: #ffffff; border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); padding: 40px 50px; box-sizing: border-box;
		}

		.page-title {
			font-size: 24px; color: #1e293b; font-weight: 600; margin-bottom: 30px; text-align: center;
			letter-spacing: 1px; position: relative; padding-bottom: 15px;
		}
		.page-title::after {
			content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
			width: 40px; height: 4px; background: linear-gradient(90deg, #00b4db, #008476); border-radius: 2px;
		}

		/* Layui 表单深度美化 */
		.layui-form-item { margin-bottom: 22px; }
		.layui-form-label { width: 110px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; }
		.layui-input-block { margin-left: 125px; }

		.layui-input, .layui-textarea, .layui-select {
			border-radius: 10px !important; border: 1px solid #e2e8f0; background-color: #f8fafc; color: #334155;
			padding-left: 15px; transition: all 0.3s; height: 48px;
		}
		.layui-textarea { min-height: 100px; padding: 15px; line-height: 1.6; height: auto; }
		.layui-input:focus, .layui-textarea:focus { background-color: #ffffff; border-color: #008476; box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1); }

		/* 锁定/只读状态 */
		.layui-input[readonly], .layui-textarea[readonly], .layui-input[disabled] {
			background-color: #eef2f5 !important; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0 !important;
		}

		/* 宣传图上传组件 */
		.upload-area {
			border: 2px dashed #cbd5e1; border-radius: 12px; padding: 20px; text-align: center;
			background: #f8fafc; transition: all 0.3s; display: inline-block; min-width: 250px;
		}
		.upload-area:hover { border-color: #008476; background: #f0fdfa; }
		.upload-preview { max-width: 100%; max-height: 160px; border-radius: 8px; margin-top: 15px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
		.btn-upload-pic { background: #ffffff; border: 1px solid #008476; color: #008476; padding: 0 25px; height: 42px; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 5px; margin: 0 auto; }
		.btn-upload-pic:hover { background: rgba(0, 132, 118, 0.05); transform: translateY(-2px); }

		/* 底部提交栏 */
		.btn-container { text-align: center; margin-top: 40px; }
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 45px;
			height: 50px; border-radius: 10px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer;
			box-shadow: 0 6px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s; display: inline-block;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 132, 118, 0.4); }
		.btn-back {
			background: #ffffff; color: #64748b; border: 1px solid #cbd5e1; padding: 0 35px; height: 50px;
			border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-left: 20px; display: inline-block;
		}
		.btn-back:hover { color: #1e293b; border-color: #94a3b8; background: #f8fafc; }

		@media (max-width: 768px) {
			.add-container { margin: 20px; padding: 30px 20px; }
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.btn-back { margin-left: 0; margin-top: 15px; display: block; width: 100%; }
			.btn-submit { display: block; width: 100%; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">发布 / 编辑诊疗</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗名称：</label>
				<div class="layui-input-block">
					<input v-model="detail.xiangmumingcheng" type="text" :readonly="ro.xiangmumingcheng" name="xiangmumingcheng" id="xiangmumingcheng" autocomplete="off" class="layui-input" placeholder="请输入诊疗名称(必填)" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗分类：</label>
				<div class="layui-input-block">
					<select name="xiangmufenlei" id="xiangmufenlei" lay-filter="xiangmufenlei" :disabled="ro.xiangmufenlei">
						<option value="">请选择诊疗所属分类</option>
						<option v-for="(item,index) in xiangmufenleiOptions" v-bind:key="index" :value="item">{{item}}</option>
					</select>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">宣传封面：</label>
				<div class="layui-input-block">
					<div class="upload-area">
						<button type="button" class="btn-upload-pic" id="tupianUpload">
							<i class="layui-icon layui-icon-upload-drag"></i> 上传诊疗图片
						</button>
						<input type="hidden" id="tupian" name="tupian" v-model="detail.tupian" />
						<div>
							<img id="tupianImg" class="upload-preview" src="">
						</div>
					</div>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">所属科室：</label>
				<div class="layui-input-block">
					<input v-model="detail.keshi" type="text" :readonly="ro.keshi" name="keshi" id="keshi" autocomplete="off" class="layui-input" placeholder="请输入具体科室名称">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">费用：</label>
				<div class="layui-input-block">
					<input v-model="detail.feiyong" type="number" :readonly="ro.feiyong" name="feiyong" id="feiyong" autocomplete="off" class="layui-input" placeholder="输入预估费用(元)">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗详情介绍：</label>
				<div class="layui-input-block">
					<textarea name="xiangmujieshao" id="xiangmujieshao">在这里详细描述该诊疗的优势、适用人群和注意事项...</textarea>
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">保存并发布诊疗</button>
				<button type="button" class="btn-back" @click="back()">取消返回</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: {
				xiangmumingcheng: '',
				xiangmufenlei: '',
				tupian: '',
				keshi: '',
				feiyong: '',
				xiangmujieshao: '',
			},
			ro:{
				xiangmumingcheng : false,
				xiangmufenlei : false,
				tupian : false,
				keshi : false,
				feiyong : false,
				xiangmujieshao : false,
			},
			xiangmufenleiOptions: [],
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() { window.history.back(); }
		}
	})

	layui.use(['layer', 'element', 'http', 'jquery', 'form', 'upload', 'tinymce'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;
		var form = layui.form;
		var upload = layui.upload;
		var tinymce = layui.tinymce;
		vue.baseurl = http.baseurl;

		// 获取 诊疗分类 的字典表数据
		http.request(`option/xiangmufenlei/xiangmufenlei`,'get',{},(res)=>{
			vue.xiangmufenleiOptions = res.data;
			// 渲染下拉框后必须重新render form
			setTimeout(() => { form.render('select'); }, 50);
		});

		// 监听分类下拉框的选择，同步到 Vue 的 detail 中
		form.on('select(xiangmufenlei)', function(data){
			vue.detail.xiangmufenlei = data.value;
		});

		// 单图封面上传组件
		var tupianUpload = upload.render({
			elem: '#tupianUpload',
			url: http.baseurl + 'file/upload',
			headers: { 'Token': localStorage.getItem('Token') },
			accept: 'images',
			before: function() { layer.load(1); },
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#tupian').val(url);
					// 预览图片并显示
					jquery('#tupianImg').attr('src', http.baseurl + url).css('display', 'inline-block');
					vue.detail.tupian = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			},
			error: function() { layer.closeAll('loading'); layer.msg("请求接口异常", { time: 2000, icon: 5 }); }
		});

		// 判断是否有跨表传参数据填充
		if(localStorage.getItem('crossTable')) {
			var crossTable = localStorage.getItem('crossTable');
			var crossObj = JSON.parse(localStorage.getItem('crossObj'));
			for (var o in crossObj){
				if(o=='xiangmumingcheng'){ vue.detail[o] = crossObj[o]; vue.ro.xiangmumingcheng = true; continue; }
				if(o=='xiangmufenlei'){ vue.detail[o] = crossObj[o]; vue.ro.xiangmufenlei = true; continue; }
				if(o=='keshi'){ vue.detail[o] = crossObj[o]; vue.ro.keshi = true; continue; }
				if(o=='feiyong'){ vue.detail[o] = crossObj[o]; vue.ro.feiyong = true; continue; }
			}
		}

		// 修改时的回显逻辑（兼容从详情页跳过来的编辑操作）
		var id = http.getParam('id');
		if (id) {
			http.request('xiangmuxinxi/info/' + id, 'get', {}, function(res) {
				vue.detail = res.data;
				// 如果有图片，回显预览图
				if(vue.detail.tupian) {
					var tupianArr = vue.detail.tupian.split(',');
					jquery('#tupianImg').attr('src', http.baseurl + tupianArr[0]).css('display', 'inline-block');
				}
				// 解决下拉框回显延迟问题
				setTimeout(() => {
					jquery('#xiangmufenlei').val(vue.detail.xiangmufenlei);
					form.render('select');
				}, 100);
			});
		}

		// 初始化富文本编辑器 (诊疗简介)
		var edit = tinymce.render({
			elem: "#xiangmujieshao",
			height: 400,
			images_upload_handler: function(blobInfo, succFun, failFun) {
				var xhr, formData;
				var file = blobInfo.blob();
				xhr = new XMLHttpRequest();
				xhr.withCredentials = false;
				xhr.open('POST', http.baseurl + 'file/upload');
				xhr.setRequestHeader("Token", localStorage.getItem('Token'));
				xhr.onload = function() {
					var json;
					if (xhr.status != 200) { failFun('HTTP Error: ' + xhr.status); return; }
					json = JSON.parse(xhr.responseText);
					if (!json || typeof json.file != 'string') { failFun('Invalid JSON: ' + xhr.responseText); return; }
					succFun(http.baseurl + 'upload/' + json.file);
				};
				formData = new FormData();
				formData.append('file', file, file.name);
				xhr.send(formData);
			}
		}, (opt) => { });

		// 提交表单保存
		form.on('submit(*)', function(data) {
			data = data.field;
			// 抓取并同步富文本数据
			data.xiangmujieshao = tinymce.get('#xiangmujieshao').getContent();

			// 如果有必要验证纯数字价格可以保留原有逻辑
			if(data.feiyong && !isNumber(data.feiyong)){
				layer.msg('价格必须为纯数字', {time: 2000,icon: 5});
				return false;
			}

			let url = id ? 'xiangmuxinxi/update' : 'xiangmuxinxi/add';
			if(id) { data.id = id; }

			http.requestJson(url, 'post', data, function(res) {
				layer.msg('保存并发布成功', { time: 2000, icon: 6 }, function() { back(); });
			});
			return false;
		});

	});
</script>
</body>
</html>
