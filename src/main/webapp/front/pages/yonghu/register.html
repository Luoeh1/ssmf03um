<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>用户注册 - 社区诊疗与健康档案管理系统</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			background-color: #eef2f5; overflow-x: hidden;
		}

		/* 动态光斑环境光背景 */
		.ambient-bg {
			position: fixed; width: 100vw; height: 100vh; z-index: 1; background: linear-gradient(120deg, #f0f4f8 0%, #d9e2e8 100%);
		}
		.blob {
			position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: float 15s infinite ease-in-out alternate;
		}
		.blob-1 { top: 5%; left: -10%; width: 50vw; height: 50vw; background: #a1c4fd; }
		.blob-2 { bottom: -10%; right: 5%; width: 55vw; height: 55vw; background: #c2e9fb; animation-delay: -5s; }
		.blob-3 { top: 40%; left: 50%; width: 35vw; height: 35vw; background: #8fd3f4; opacity: 0.4; animation-delay: -10s; }

		@keyframes float {
			0% { transform: translate(0, 0) scale(1); }
			100% { transform: translate(5%, 10%) scale(1.1); }
		}

		/* 注册容器 */
		.register-container {
			position: relative; z-index: 10; display: flex; justify-content: center; align-items: center;
			min-height: 100vh; padding: 40px 20px; box-sizing: border-box;
		}

		/* 毛玻璃表单卡片 */
		.register-form {
			box-sizing: border-box; padding: 45px 50px; width: 600px; max-width: 100%;
			background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
			border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 24px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
			transition: transform 0.3s ease;
		}

		.header-title { text-align: center; margin-bottom: 35px; }
		.header-title h1 { font-size: 26px; color: #1a2b3c; font-weight: 600; letter-spacing: 2px; margin: 0 0 10px 0; }
		.header-title p { font-size: 14px; color: #64748b; margin: 0; }

		/* Layui 表单项重绘 */
		.layui-form-item { margin-bottom: 22px; }
		.layui-form-label { width: 90px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; text-align: right; }
		.layui-input-block { margin-left: 105px; }

		.layui-input {
			width: 100%; height: 46px; padding-left: 16px; border-radius: 10px; font-size: 15px; color: #334155;
			background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 2px 6px rgba(0,0,0,0.02) inset;
			transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
		}
		.layui-input:focus { background: rgba(255, 255, 255, 1); border-color: #008476; box-shadow: 0 0 0 4px rgba(0, 132, 118, 0.15); }

		/* 单选框美化 */
		.layui-form-radio { margin: 6px 15px 0 0; }
		.layui-form-radio>i { color: #cbd5e1; font-size: 20px; }
		.layui-form-radioed>i { color: #008476 !important; }
		.layui-form-radio>div { color: #475569; }
		.layui-form-radioed>div { color: #008476 !important; font-weight: bold; }

		/* 注册按钮 */
		.btn-register {
			width: 100%; height: 52px; line-height: 52px; border-radius: 12px; border: none;
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: #fff; font-size: 16px;
			font-weight: 600; letter-spacing: 4px; cursor: pointer; box-shadow: 0 6px 20px rgba(0, 132, 118, 0.3);
			transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); margin-top: 15px; display: block; text-align: center;
		}
		.btn-register:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 132, 118, 0.45); }

		/* 返回登录 */
		.back-login {
			display: block; text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; text-decoration: none; transition: color 0.3s;
		}
		.back-login:hover { color: #008476; text-decoration: underline; }

		@media (max-width: 768px) {
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.register-form { padding: 30px 20px; }
		}
	</style>
</head>
<body>
<div class="ambient-bg">
	<div class="blob blob-1"></div>
	<div class="blob blob-2"></div>
	<div class="blob blob-3"></div>
</div>

<div class="register-container" id="app">
	<form class="layui-form register-form">
		<div class="header-title">
			<h1>用户注册</h1>
			<p>欢迎加入社区诊疗与健康档案管理平台</p>
		</div>

		<div class="layui-form-item">
			<label class="layui-form-label">账号</label>
			<div class="layui-input-block">
				<input type="text" name="yonghuzhanghao" required lay-verify="required" placeholder="请输入系统账号(必填)" autocomplete="off" class="layui-input">
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">密码</label>
			<div class="layui-input-block">
				<input type="password" name="mima" required lay-verify="required" placeholder="请输入登录密码(必填)" autocomplete="off" class="layui-input">
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">姓名</label>
			<div class="layui-input-block">
				<input type="text" name="yonghuxingming" required lay-verify="required" placeholder="请输入真实姓名(必填)" autocomplete="off" class="layui-input">
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">性别</label>
			<div class="layui-input-block">
				<input type="radio" name="xingbie" value="男" title="男" checked>
				<input type="radio" name="xingbie" value="女" title="女">
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">年龄</label>
			<div class="layui-input-block">
				<input type="text" name="nianling" placeholder="请输入年龄" autocomplete="off" class="layui-input">
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">手机号</label>
			<div class="layui-input-block">
				<input type="text" name="shouji" lay-verify="phone" placeholder="请输入常用手机号码" autocomplete="off" class="layui-input">
			</div>
		</div>
		<div class="layui-form-item">
			<label class="layui-form-label">身份证</label>
			<div class="layui-input-block">
				<input type="text" name="shenfenzheng" lay-verify="identity" placeholder="请输入18位身份证号(建档需实名)" autocomplete="off" class="layui-input">
			</div>
		</div>

		<button class="btn-register" lay-submit lay-filter="register">立即注册健康档案</button>
		<a class="back-login" href="javascript:window.location.href='../login/login.html'">已有账号？返回登录</a>
	</form>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>
<script>
	layui.use(['layer', 'element', 'form', 'http', 'jquery'], function() {
		var layer = layui.layer;
		var form = layui.form;
		var http = layui.http;
		var jquery = layui.jquery;

		var tablename = http.getParam('tablename') || 'yonghu';

		// 提交注册表单
		form.on('submit(register)', function(data) {
			data = data.field;
			if(!data.yonghuzhanghao){ layer.msg('账号不能为空', {time: 2000,icon: 5}); return false; }
			if(!data.mima){ layer.msg('密码不能为空', {time: 2000,icon: 5}); return false; }
			if(!data.yonghuxingming){ layer.msg('姓名不能为空', {time: 2000,icon: 5}); return false; }
			if(data.nianling && !isIntNumer(data.nianling)){ layer.msg('年龄应输入整数', {time: 2000,icon: 5}); return false; }
			if(data.shouji && !isMobile(data.shouji)){ layer.msg('手机应输入手机格式', {time: 2000,icon: 5}); return false; }
			if(data.shenfenzheng && !isIdentity(data.shenfenzheng)){ layer.msg('身份证应输入身份证格式', {time: 2000,icon: 5}); return false; }

			http.requestJson(tablename + '/register', 'post', data, function(res) {
				layer.msg('注册成功', { time: 2000, icon: 6 }, function() {
					window.location.href = '../login/login.html';
				});
			});
			return false;
		});
	});
</script>
</body>
</html>
