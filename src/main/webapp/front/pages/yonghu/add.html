<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>添加/编辑用户</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.add-container {
			max-width: 700px; margin: 40px auto; background: #ffffff; border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); padding: 40px 50px; box-sizing: border-box;
		}

		.page-title {
			font-size: 24px; color: #1e293b; font-weight: 600; margin-bottom: 30px; text-align: center;
			letter-spacing: 1px; position: relative; padding-bottom: 15px;
		}
		.page-title::after {
			content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
			width: 40px; height: 4px; background: linear-gradient(90deg, #00b4db, #008476); border-radius: 2px;
		}

		.layui-form-item { margin-bottom: 22px; }
		.layui-form-label { width: 100px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; }
		.layui-input-block { margin-left: 115px; }

		.layui-input {
			border-radius: 10px !important; border: 1px solid #e2e8f0; background-color: #f8fafc; color: #334155;
			padding-left: 15px; transition: all 0.3s; height: 46px;
		}
		.layui-input:focus { background-color: #ffffff; border-color: #008476; box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1); }

		.layui-input[readonly], .layui-input[disabled] {
			background-color: #eef2f5 !important; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0 !important;
		}

		.upload-area {
			border: 2px dashed #cbd5e1; border-radius: 12px; padding: 15px; text-align: center;
			background: #f8fafc; transition: all 0.3s; display: inline-block; min-width: 200px;
		}
		.upload-area:hover { border-color: #008476; background: #f0fdfa; }
		.upload-preview { max-width: 120px; max-height: 120px; border-radius: 50%; margin-top: 15px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); object-fit: cover;}
		.btn-upload-pic { background: #ffffff; border: 1px solid #008476; color: #008476; padding: 0 20px; height: 38px; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 5px; margin: 0 auto; }
		.btn-upload-pic:hover { background: rgba(0, 132, 118, 0.05); transform: translateY(-2px); }

		.layui-form-radio { margin: 6px 15px 0 0; }
		.layui-form-radio>i { color: #cbd5e1; font-size: 20px; }
		.layui-form-radioed>i { color: #008476 !important; }
		.layui-form-radio>div { color: #475569; }
		.layui-form-radioed>div { color: #008476 !important; font-weight: bold; }

		.btn-container { text-align: center; margin-top: 40px; }
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 45px;
			height: 50px; border-radius: 10px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer;
			box-shadow: 0 6px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s; display: inline-block;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 132, 118, 0.4); }
		.btn-back {
			background: #ffffff; color: #64748b; border: 1px solid #cbd5e1; padding: 0 35px; height: 50px;
			border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-left: 20px; display: inline-block;
		}
		.btn-back:hover { color: #1e293b; border-color: #94a3b8; background: #f8fafc; }

		@media (max-width: 768px) {
			.add-container { margin: 20px; padding: 30px 20px; }
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.btn-back { margin-left: 0; margin-top: 15px; display: block; width: 100%; }
			.btn-submit { display: block; width: 100%; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">系统用户档案维护</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">登录账号：</label>
				<div class="layui-input-block">
					<input v-model="detail.zhanghao" type="text" :readonly="ro.zhanghao" name="zhanghao" id="zhanghao" autocomplete="off" class="layui-input" placeholder="请输入系统账号(必填)" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">密码：</label>
				<div class="layui-input-block">
					<input v-model="detail.mima" type="password" :readonly="ro.mima" name="mima" id="mima" autocomplete="off" class="layui-input" placeholder="请输入密码(必填)" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">真实姓名：</label>
				<div class="layui-input-block">
					<input v-model="detail.xingming" type="text" :readonly="ro.xingming" name="xingming" id="xingming" autocomplete="off" class="layui-input" placeholder="请输入姓名(必填)" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">上传头像：</label>
				<div class="layui-input-block">
					<div class="upload-area">
						<button type="button" class="btn-upload-pic" id="touxiangUpload">
							<i class="layui-icon layui-icon-upload-drag"></i> 点击上传
						</button>
						<input type="hidden" id="touxiang" name="touxiang" v-model="detail.touxiang" />
						<div>
							<img id="touxiangImg" class="upload-preview" src="">
						</div>
					</div>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">性别：</label>
				<div class="layui-input-block">
					<input type="radio" v-model="detail.xingbie" name="xingbie" value="男" title="男" checked>
					<input type="radio" v-model="detail.xingbie" name="xingbie" value="女" title="女">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">年龄：</label>
				<div class="layui-input-block">
					<input v-model="detail.nianling" type="text" :readonly="ro.nianling" name="nianling" id="nianling" autocomplete="off" class="layui-input" placeholder="请输入年龄(数字)">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">手机号码：</label>
				<div class="layui-input-block">
					<input v-model="detail.shouji" type="text" :readonly="ro.shouji" name="shouji" id="shouji" autocomplete="off" class="layui-input" placeholder="请输入手机号码" lay-verify="phone">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">身份证号：</label>
				<div class="layui-input-block">
					<input v-model="detail.shenfenzheng" type="text" :readonly="ro.shenfenzheng" name="shenfenzheng" id="shenfenzheng" autocomplete="off" class="layui-input" placeholder="请输入18位身份证号" lay-verify="identity">
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">保存提交</button>
				<button type="button" class="btn-back" @click="back()">取消返回</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: {
				zhanghao: '',
				mima: '',
				xingming: '',
				touxiang: '',
				xingbie: '男',
				nianling: '',
				shouji: '',
				shenfenzheng: ''
			},
			ro:{
				zhanghao : false,
				mima : false,
				xingming : false,
				touxiang : false,
				xingbie : false,
				nianling : false,
				shouji : false,
				shenfenzheng : false
			},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() { window.history.back(); }
		}
	})

	layui.use(['layer', 'element', 'http', 'jquery', 'form', 'upload'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;
		var form = layui.form;
		var upload = layui.upload;
		vue.baseurl = http.baseurl;

		// 头像上传
		var touxiangUpload = upload.render({
			elem: '#touxiangUpload',
			url: http.baseurl + 'file/upload',
			headers: { 'Token': localStorage.getItem('Token') },
			accept: 'images',
			before: function() { layer.load(1); },
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#touxiang').val(url);
					jquery('#touxiangImg').attr('src', http.baseurl + url).css('display', 'inline-block');
					vue.detail.touxiang = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			},
			error: function() { layer.closeAll('loading'); layer.msg("请求接口异常", { time: 2000, icon: 5 }); }
		});

		// 跨表传参处理
		if(localStorage.getItem('crossTable')) {
			var crossTable = localStorage.getItem('crossTable');
			var crossObj = JSON.parse(localStorage.getItem('crossObj'));
			for (var o in crossObj){
				if(o=='zhanghao'){ vue.detail[o] = crossObj[o]; vue.ro.zhanghao = true; continue; }
				if(o=='xingming'){ vue.detail[o] = crossObj[o]; vue.ro.xingming = true; continue; }
				if(o=='shouji'){ vue.detail[o] = crossObj[o]; vue.ro.shouji = true; continue; }
			}
		}

		// 修改时的回显
		var id = http.getParam('id');
		if (id) {
			http.request('yonghu/info/' + id, 'get', {}, function(res) {
				vue.detail = res.data;
				// 回显性别单选框
				jquery("input[name='xingbie'][value='"+vue.detail.xingbie+"']").attr("checked",true);
				form.render('radio');
				// 回显图片
				if(vue.detail.touxiang) {
					var tupianArr = vue.detail.touxiang.split(',');
					jquery('#touxiangImg').attr('src', http.baseurl + tupianArr[0]).css('display', 'inline-block');
				}
			});
		}

		// 提交表单保存
		form.on('submit(*)', function(data) {
			data = data.field;

			// 年龄纯数字校验保留
			if(data.nianling && !isIntNumer(data.nianling)){
				layer.msg('年龄应输入整数', {time: 2000,icon: 5});
				return false;
			}

			let url = id ? 'yonghu/update' : 'yonghu/add';
			if(id) { data.id = id; }

			http.requestJson(url, 'post', data, function(res) {
				layer.msg('操作成功', { time: 2000, icon: 6 }, function() { back(); });
			});
			return false;
		});

	});
</script>
</body>
</html>
