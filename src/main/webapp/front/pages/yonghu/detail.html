<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>用户详情</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.detail-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }

		.breadcrumb { margin-bottom: 25px; font-size: 15px; color: #64748b; display: flex; align-items: center; }
		.breadcrumb a { color: #475569; text-decoration: none; transition: color 0.3s; }
		.breadcrumb a:hover { color: #008476; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		.profile-card {
			background: #ffffff; border-radius: 20px; padding: 40px; display: flex; gap: 50px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); align-items: flex-start;
		}

		.avatar-area {
			flex: 0 0 180px; display: flex; flex-direction: column; align-items: center;
		}
		.avatar-area img {
			width: 180px; height: 180px; border-radius: 50%; object-fit: cover;
			border: 5px solid #f8fafc; box-shadow: 0 8px 25px rgba(0,0,0,0.06); margin-bottom: 15px;
		}

		.info-area { flex: 1; display: flex; flex-direction: column; }

		.name-row { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
		.user-name { font-size: 32px; color: #1e293b; font-weight: bold; margin: 0; }
		.gender-tag {
			background: #e0f2fe; color: #0284c7; padding: 4px 14px; border-radius: 20px; font-size: 14px; font-weight: 500;
		}
		.age-tag {
			background: #f1f5f9; color: #475569; padding: 4px 14px; border-radius: 20px; font-size: 14px; font-weight: 500;
		}

		.attr-grid {
			display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8fafc; padding: 25px; border-radius: 16px; margin-bottom: 25px;
		}
		.attr-item { display: flex; font-size: 15px; }
		.attr-item .label { color: #64748b; width: 90px; flex-shrink: 0; }
		.attr-item .val { color: #334155; font-weight: 500; }

		/* 底部操作区 */
		.action-area { margin-top: auto; display: flex; gap: 15px; flex-wrap: wrap;}
		.btn-primary {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 35px;
			height: 48px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer;
			box-shadow: 0 4px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s;
		}
		.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 132, 118, 0.4); color: white;}

		@media (max-width: 768px) {
			.profile-card { flex-direction: column; align-items: center; padding: 25px; }
			.attr-grid { grid-template-columns: 1fr; }
		}
	</style>
</head>
<body>
<div id="app" class="detail-container">

	<div class="breadcrumb">
		<a href="javascript:window.history.back();"><i class="layui-icon layui-icon-left"></i> 返回档案列表</a>
		<span>/</span>
		用户详细信息
	</div>

	<div class="profile-card">
		<div class="avatar-area">
			<img :src="detail.touxiang ? baseurl + detail.touxiang.split(',')[0] : '../../layui/images/face/0.gif'" alt="用户头像">
		</div>

		<div class="info-area">
			<div class="name-row">
				<h1 class="user-name">{{detail.xingming || detail.zhanghao}}</h1>
				<span class="gender-tag" v-if="detail.xingbie">{{detail.xingbie}}</span>
				<span class="age-tag" v-if="detail.nianling">{{detail.nianling}} 岁</span>
			</div>

			<div class="attr-grid">
				<div class="attr-item" v-if="detail.zhanghao">
					<div class="label">系统账号：</div>
					<div class="val">{{detail.zhanghao}}</div>
				</div>
				<div class="attr-item" v-if="detail.shouji">
					<div class="label">联系电话：</div>
					<div class="val">{{detail.shouji}}</div>
				</div>
				<div class="attr-item" v-if="detail.shenfenzheng">
					<div class="label">身份证号：</div>
					<div class="val">{{detail.shenfenzheng}}</div>
				</div>
			</div>

			<div class="action-area">
				<button v-if="isAuth('yonghu','修改')" @click="jump('../yonghu/add.html?id='+detail.id)" class="btn-primary">编辑用户信息</button>

			</div>
		</div>
	</div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: { id: 0 },
			detailTable: 'yonghu',
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			isAuth(tablename, button) { return isFrontAuth(tablename, button) },
			onAcrossTap(tableName, crossOptAudit, statusColumnName, tips, statusColumnValue) {
				localStorage.setItem('crossTable', `yonghu`);
				localStorage.setItem('crossObj', JSON.stringify(this.detail));
				localStorage.setItem('statusColumnName', statusColumnName);
				localStorage.setItem('statusColumnValue', statusColumnValue);
				localStorage.setItem('tips', tips);
				jump(`../${tableName}/add.html?corss=true`);
			},
		}
	});

	layui.use(['layer', 'http', 'jquery'], function() {
		var layer = layui.layer;
		var http = layui.http;
		var jquery = layui.jquery;

		var id = http.getParam('id');
		vue.detail.id = id;
		vue.baseurl = http.baseurl;

		http.request(`${vue.detailTable}/detail/` + id, 'get', {}, function(res) {
			vue.detail = res.data;
			// 图片路径清洗
			if(vue.detail.touxiang && vue.detail.touxiang.indexOf('http') == -1) {
				vue.detail.touxiang = vue.detail.touxiang.replace(http.baseurl,"");
			}
		});
	});
</script>
</body>
</html>
