<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>个人中心</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<link rel="stylesheet" href="../../css/style.css" />
	<link rel="stylesheet" href="../../css/theme.css" />
	<link rel="stylesheet" href="../../css/common.css" />
	<style>
		html, body {
			background-color: #f5f5f5;
			height: 100%;
			margin: 0;
			padding: 0;
		}
		#app {
			display: flex;
			max-width: 1200px;
			margin: 20px auto;
			min-height: 800px;
			align-items: flex-start;
			gap: 20px;
		}
		/* 左侧导航栏静态布局 */
		.left-menu {
			width: 240px;
			background: #fff;
			box-shadow: 0 2px 12px 0 rgba(0,0,0,.1);
			border-radius: 8px;
			overflow: hidden;
			flex-shrink: 0;
		}
		.user-info {
			padding: 30px 20px;
			text-align: center;
			background: var(--theme-color, #009688);
			color: #fff;
		}
		.user-info img {
			width: 80px;
			height: 80px;
			border-radius: 50%;
			border: 3px solid rgba(255,255,255,0.4);
			margin-bottom: 10px;
			object-fit: cover;
		}
		.user-info .name {
			font-size: 18px;
			font-weight: bold;
		}
		.menu-list {
			list-style: none;
			padding: 10px 0;
			margin: 0;
		}
		.menu-list li {
			padding: 0 20px;
			height: 50px;
			line-height: 50px;
			cursor: pointer;
			font-size: 15px;
			color: #333;
			border-left: 4px solid transparent;
			transition: all 0.3s;
		}
		.menu-list li:hover {
			background: #f8f8f8;
			color: var(--theme-color, #009688);
		}
		.menu-list li.active {
			background: #e6fdfa;
			color: var(--theme-color, #009688);
			border-left-color: var(--theme-color, #009688);
			font-weight: bold;
		}

		/* 右侧主体内容 */
		.right-content {
			flex: 1;
			background: #fff;
			box-shadow: 0 2px 12px 0 rgba(0,0,0,.1);
			border-radius: 8px;
			padding: 20px;
			min-height: 760px;
			position: relative;
		}

		/* 嵌套 iframe 设置 */
		#content-iframe {
			width: 100%;
			height: 100%;
			min-height: 720px;
			border: none;
			display: block;
		}

		/* 修复表单内部样式 */
		.layui-form-label {
			width: 100px;
		}
		.layui-input-block {
			margin-left: 130px;
		}
	</style>
</head>
<body>

<div id="app">
	<div class="left-menu">
		<div class="user-info">
			<img :src="sessionForm.touxiang ? baseurl + sessionForm.touxiang : '../../layui/images/face/0.gif'" alt="头像">
			<div class="name">{{sessionForm.yonghuxingming || sessionForm.yonghuzhanghao || '用户'}}</div>
		</div>
		<ul class="menu-list">
			<li :class="currentMenu === 'info' ? 'active' : ''" @click="navTo('info', '')">个人基本信息</li>

			<li v-for="(item, index) in centerMenu" :key="index"
				v-if="item.name !== '个人中心'"
				:class="currentMenu === item.name ? 'active' : ''"
				@click="navTo(item.name, item.url)">
				{{item.name}}
			</li>
		</ul>
	</div>

	<div class="right-content">

		<div v-show="currentMenu === 'info'" class="personal-info-form">
			<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
				<legend>个人基本信息</legend>
			</fieldset>
			<form class="layui-form" lay-filter="myForm">
				<div class="layui-form-item">
					<label class="layui-form-label">用户账号</label>
					<div class="layui-input-block">
						<input type="text" name="yonghuzhanghao" id="yonghuzhanghao" readonly autocomplete="off" class="layui-input" style="background:#f5f5f5;">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">密码</label>
					<div class="layui-input-block">
						<input type="password" name="mima" id="mima" placeholder="密码" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">用户姓名</label>
					<div class="layui-input-block">
						<input type="text" name="yonghuxingming" id="yonghuxingming" placeholder="用户姓名" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">性别</label>
					<div class="layui-input-block">
						<input type="radio" name="xingbie" value="男" title="男" checked>
						<input type="radio" name="xingbie" value="女" title="女">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">电话号码</label>
					<div class="layui-input-block">
						<input type="text" name="dianhuahaoma" id="dianhuahaoma" placeholder="电话号码" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">紧急联系人</label>
					<div class="layui-input-block">
						<input type="text" name="jinjilianxiren" id="jinjilianxiren" placeholder="紧急联系人" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">头像</label>
					<div class="layui-input-block">
						<img id="touxiangImg" style="width: 100px;height: 100px;border-radius: 50%;border: 2px solid #EEEEEE;margin-right: 15px;" src="../../layui/images/face/0.gif">
						<input type="hidden" id="touxiang" name="touxiang" />
						<button type="button" class="layui-btn layui-btn-sm layui-btn-normal" id="touxiangUpload">
							<i class="layui-icon">&#xe67c;</i>上传头像
						</button>
					</div>
				</div>

				<div class="layui-form-item">
					<div class="layui-input-block">
						<button class="layui-btn layui-btn-normal" lay-submit lay-filter="*">更新信息</button>
					</div>
				</div>
			</form>
		</div>

		<iframe v-if="currentMenu !== 'info'" :src="currentMenuUrl" id="content-iframe" scrolling="yes"></iframe>

	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			// 来源于 js/config.js 或者 API 接口，取决于您的项目框架结构
			centerMenu: centerMenu,
			sessionForm: {},
			baseurl: '',
			// 控制当前选中的菜单：默认为个人信息
			currentMenu: 'info',
			// Iframe 的指向链接
			currentMenuUrl: ''
		},
		methods: {
			// 切换左侧菜单
			navTo(menuName, url) {
				this.currentMenu = menuName;
				if (menuName !== 'info') {
					// 转跳到 iframe 指定页面
					this.currentMenuUrl = url;
				}
			}
		}
	});

	layui.use(['layer', 'element', 'form', 'http', 'jquery', 'upload'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var form = layui.form;
		var http = layui.http;
		var jquery = layui.jquery;
		var upload = layui.upload;

		vue.baseurl = http.baseurl;

		// 检查登录状态
		var table = localStorage.getItem("userTable");
		if(!table){
			layer.msg('请先登录', { time: 2000, icon: 5 }, function() {
				window.parent.location.href = '../login/login.html';
			});
			return;
		}

		// 初始化获取用户信息
		http.request(`${table}/session`, 'get', {}, function(data) {
			vue.sessionForm = data.data;
			// 为表单赋值
			form.val("myForm", data.data);
			// 回显头像
			if(data.data.touxiang){
				jquery("#touxiangImg").attr("src", http.baseurl + data.data.touxiang);
				jquery('#touxiang').val(data.data.touxiang);
			}
			element.render();
		});

		// 头像上传
		var touxiangUpload = upload.render({
			elem: '#touxiangUpload',
			url: http.baseurl + 'file/upload',
			headers: {
				'Token': localStorage.getItem('Token')
			},
			accept: 'images',
			before: function() {
				layer.load(1);
			},
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#touxiang').val(url);
					jquery('#touxiangImg').attr('src', http.baseurl + url);
					vue.sessionForm.touxiang = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			},
			error: function() {
				layer.closeAll('loading');
				layer.msg("请求接口异常", { time: 2000, icon: 5 });
			}
		});

		// 表单提交更新信息
		form.on('submit(*)', function(data) {
			data = data.field;
			// 校验输入
			if(!data.yonghuzhanghao){ layer.msg('用户账号不能为空', {time: 2000, icon: 5}); return false; }
			if(!data.mima){ layer.msg('密码不能为空', {time: 2000, icon: 5}); return false; }
			if(!data.yonghuxingming){ layer.msg('用户姓名不能为空', {time: 2000, icon: 5}); return false; }
			if(data.dianhuahaoma && !isMobile(data.dianhuahaoma)){
				layer.msg('电话号码应输入手机格式', {time: 2000, icon: 5});
				return false;
			}
			if(data.jinjilianxiren && !isMobile(data.jinjilianxiren)){
				layer.msg('紧急联系人应输入手机格式', {time: 2000, icon: 5});
				return false;
			}

			// 更新请求
			http.requestJson(`${table}/update`, 'post', data, function(res) {
				layer.msg('修改成功', { time: 2000, icon: 6 }, function() {
					window.location.reload();
				});
			});
			return false;
		});

		// 动态调整 iframe 的高度，防止滚动条重叠
		setInterval(function() {
			var iframe = document.getElementById('content-iframe');
			if (iframe && iframe.contentWindow && iframe.contentWindow.document.body) {
				var scrollHeight = iframe.contentWindow.document.body.scrollHeight;
				if(scrollHeight > 720) {
					iframe.style.height = scrollHeight + 30 + 'px';
				}
			}
		}, 300);
	});
</script>
</body>
</html>
