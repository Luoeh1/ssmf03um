<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>个人中心</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0;
			padding: 0;
			background-color: #f5f8fa; /* 护眼浅灰蓝背景 */
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		/* 居中大容器 */
		.center-container {
			max-width: 1400px;
			margin: 30px auto;
			padding: 0 20px;
			display: flex;
			gap: 30px;
			box-sizing: border-box;
			align-items: flex-start;
		}

		/* ================= 左侧菜单栏 ================= */
		.left-menu {
			flex: 0 0 260px;
			background: #ffffff;
			border-radius: 20px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
			overflow: hidden;
			position: sticky;
			top: 100px;
		}

		/* 左侧顶部：用户资料卡 */
		.user-profile-header {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%);
			padding: 40px 20px 30px;
			text-align: center;
			color: #ffffff;
		}
		.user-profile-header .avatar-wrap {
			width: 90px;
			height: 90px;
			border-radius: 50%;
			border: 4px solid rgba(255, 255, 255, 0.3);
			margin: 0 auto 15px;
			overflow: hidden;
			box-shadow: 0 4px 15px rgba(0,0,0,0.1);
		}
		.user-profile-header .avatar-wrap img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		.user-profile-header .user-name {
			font-size: 18px;
			font-weight: 600;
			margin-bottom: 5px;
			letter-spacing: 1px;
		}
		.user-profile-header .user-role {
			font-size: 13px;
			color: rgba(255, 255, 255, 0.8);
		}

		/* 菜单项重写 Layui 样式 */
		.layui-nav-tree {
			width: 100% !important;
			background: transparent !important;
		}
		.layui-nav-tree .layui-nav-item {
			line-height: 50px;
			margin: 5px 15px;
			border-radius: 12px;
		}
		.layui-nav-tree .layui-nav-item a {
			color: #475569 !important;
			font-size: 15px;
			border-radius: 12px;
			transition: all 0.3s ease;
			padding: 0 20px !important;
		}
		.layui-nav-tree .layui-nav-item a:hover {
			background: rgba(0, 132, 118, 0.05) !important;
			color: #008476 !important;
			transform: translateX(5px);
		}
		/* 选中状态 */
		.layui-nav-tree .layui-this > a,
		.layui-nav-tree .layui-this > a:hover {
			background: #008476 !important;
			color: #ffffff !important;
			font-weight: bold;
			box-shadow: 0 4px 12px rgba(0, 132, 118, 0.2);
			transform: translateX(0);
		}
		.layui-nav-tree .layui-nav-bar { display: none; } /* 隐藏默认右侧绿条 */


		/* ================= 右侧内容区 ================= */
		.right-content {
			flex: 1;
			background: #ffffff;
			border-radius: 20px;
			padding: 40px 50px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
			min-height: 600px;
		}

		.section-title {
			font-size: 22px;
			color: #1e293b;
			font-weight: 600;
			margin-bottom: 30px;
			padding-bottom: 15px;
			border-bottom: 1px solid #f1f5f9;
			display: flex;
			align-items: center;
		}
		.section-title::before {
			content: '';
			display: block;
			width: 5px;
			height: 20px;
			background: #008476;
			border-radius: 4px;
			margin-right: 12px;
		}

		/* 表单高级样式 */
		.layui-form-item {
			margin-bottom: 25px;
		}
		.layui-form-label {
			width: 100px;
			padding: 12px 15px 12px 0;
			font-size: 15px;
			color: #475569;
			font-weight: 500;
			text-align: right;
		}
		.layui-input-block {
			margin-left: 115px;
			max-width: 600px; /* 限制输入框最大宽度，防止拉伸过长 */
		}
		.layui-input {
			height: 46px;
			border-radius: 10px;
			border: 1px solid #e2e8f0;
			background-color: #f8fafc;
			color: #334155;
			padding-left: 15px;
			transition: all 0.3s;
		}
		.layui-input:focus {
			background-color: #ffffff;
			border-color: #008476;
			box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1);
		}
		.layui-input[readonly] {
			background-color: #e2e8f0;
			color: #94a3b8;
			cursor: not-allowed;
		}

		/* 单选框美化 */
		.layui-form-radio { margin: 6px 15px 0 0; }
		.layui-form-radio>i { color: #cbd5e1; font-size: 20px; }
		.layui-form-radioed>i { color: #008476 !important; }
		.layui-form-radio>div { color: #475569; }
		.layui-form-radioed>div { color: #008476 !important; font-weight: bold; }

		/* 头像上传区 */
		.upload-img-wrap {
			display: flex;
			align-items: center;
			gap: 20px;
		}
		.upload-img-wrap img {
			width: 80px;
			height: 80px;
			border-radius: 12px;
			object-fit: cover;
			border: 1px dashed #e2e8f0;
			padding: 2px;
		}
		.btn-upload {
			background: #ffffff;
			color: #008476;
			border: 1px solid #008476;
			height: 38px;
			line-height: 38px;
			padding: 0 20px;
			border-radius: 8px;
			cursor: pointer;
			transition: all 0.3s;
			display: inline-block;
		}
		.btn-upload:hover {
			background: rgba(0, 132, 118, 0.05);
			transform: translateY(-2px);
		}

		/* 提交按钮 */
		.form-actions {
			margin-top: 40px;
			margin-left: 115px;
		}
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%);
			color: white;
			border: none;
			padding: 0 40px;
			height: 48px;
			border-radius: 8px;
			font-size: 16px;
			font-weight: 500;
			cursor: pointer;
			box-shadow: 0 6px 15px rgba(0, 132, 118, 0.3);
			transition: all 0.3s;
		}
		.btn-submit:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(0, 132, 118, 0.4);
		}

		/* 响应式调整 */
		@media (max-width: 900px) {
			.center-container { flex-direction: column; }
			.left-menu { width: 100%; flex: auto; position: relative; top: 0; }
			.right-content { padding: 30px 20px; width: 100%; box-sizing: border-box; }
			.layui-input-block { margin-left: 0; max-width: 100%; }
			.layui-form-label { display: block; text-align: left; width: auto; padding-bottom: 5px; }
			.form-actions { margin-left: 0; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="center-container">

		<div class="left-menu">
			<div class="user-profile-header">
				<div class="avatar-wrap">
					<img :src="sessionForm.touxiang ? baseurl + sessionForm.touxiang : '../../layui/images/face/0.gif'" alt="头像">
				</div>
				<div class="user-name">{{sessionForm.yonghuxingming || sessionForm.yonghuzhanghao || '尊贵的用户'}}</div>
				<div class="user-role">普通用户</div>
			</div>

			<ul class="layui-nav layui-nav-tree">
				<li v-for="(item,index) in centerMenu" v-bind:key="index" class="layui-nav-item" :class="index==0?'layui-this':''">
					<a :href="'javascript:jump(\''+item.url+'\')'">{{item.name}}</a>
				</li>
			</ul>
		</div>

		<div class="right-content">
			<div class="section-title">个人基本信息</div>

			<form class="layui-form" lay-filter="myForm">
				<div class="layui-form-item">
					<label class="layui-form-label">用户账号</label>
					<div class="layui-input-block">
						<input type="text" name="yonghuzhanghao" id="yonghuzhanghao" placeholder="用户账号" autocomplete="off" class="layui-input" readonly>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">用户姓名</label>
					<div class="layui-input-block">
						<input type="text" name="yonghuxingming" id="yonghuxingming" placeholder="用户姓名" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">密码</label>
					<div class="layui-input-block">
						<input type="password" name="mima" id="mima" placeholder="密码" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">性别</label>
					<div class="layui-input-block">
						<input type="radio" name="xingbie" value="男" title="男" checked>
						<input type="radio" name="xingbie" value="女" title="女">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">电话号码</label>
					<div class="layui-input-block">
						<input type="text" name="dianhuahaoma" id="dianhuahaoma" placeholder="电话号码" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">紧急联系人</label>
					<div class="layui-input-block">
						<input type="text" name="jinjilianxiren" id="jinjilianxiren" placeholder="紧急联系人" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">头像</label>
					<div class="layui-input-block">
						<div class="upload-img-wrap">
							<img id="touxiangImg" src="../../layui/images/face/0.gif" alt="头像预览">
							<input type="hidden" id="touxiang" name="touxiang" />
							<button type="button" class="btn-upload" id="touxiangUpload">
								<i class="layui-icon">&#xe67c;</i> 更换头像
							</button>
						</div>
					</div>
				</div>

				<div class="form-actions">
					<button class="btn-submit" lay-submit lay-filter="*">更新信息</button>
				</div>
			</form>
		</div>

	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			centerMenu: centerMenu,
			sessionForm: {},
			baseurl: ''
		},
		methods: {
			jump(url) {
				jump(url)
			}
		}
	})

	layui.use(['layer', 'element', 'form', 'http', 'jquery', 'laydate', 'upload'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var form = layui.form;
		var http = layui.http;
		var jquery = layui.jquery;
		var laydate = layui.laydate;
		var upload = layui.upload;

		vue.baseurl = http.baseurl;

		// 从缓存中获取当前表名 (yonghu)
		var table = localStorage.getItem("userTable");

		if(!table){
			layer.msg('请先登录', {
				time: 2000,
				icon: 5
			}, function() {
				window.parent.location.href = '../login/login.html';
			});
		}

		// 关键修复：根据表名动态获取当前用户信息，保证数据渲染
		http.request(`${table}/session`, 'get', {}, function(data) {
			vue.sessionForm = data.data;
			// 表单赋值
			form.val("myForm", data.data);
			// 头像赋值
			if(data.data.touxiang){
				jquery("#touxiangImg").attr("src", http.baseurl + data.data.touxiang);
				jquery('#touxiang').val(data.data.touxiang);
			}
			element.render('nav');
		});

		// 头像上传组件
		var touxiangUpload = upload.render({
			elem: '#touxiangUpload',
			url: http.baseurl + 'file/upload',
			headers: {
				'Token': localStorage.getItem('Token')
			},
			accept: 'images',
			before: function() {
				layer.load(1);
			},
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#touxiang').val(url);
					jquery('#touxiangImg').attr('src', http.baseurl + url);
					vue.sessionForm.touxiang = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			},
			error: function() {
				layer.closeAll('loading');
				layer.msg("请求接口异常", { time: 2000, icon: 5 });
			}
		});

		// 提交表单
		form.on('submit(*)', function(data) {
			data = data.field;
			// 匹配数据库字段的验证规则
			if(!data.yonghuzhanghao){
				layer.msg('用户账号不能为空', {time: 2000, icon: 5});
				return false;
			}
			if(!data.yonghuxingming){
				layer.msg('用户姓名不能为空', {time: 2000, icon: 5});
				return false;
			}
			if(!data.mima){
				layer.msg('密码不能为空', {time: 2000, icon: 5});
				return false;
			}
			if(data.dianhuahaoma && !isMobile(data.dianhuahaoma)){
				layer.msg('电话号码应输入手机格式', {time: 2000, icon: 5});
				return false;
			}
			if(data.jinjilianxiren && !isMobile(data.jinjilianxiren)){
				layer.msg('紧急联系人应输入手机格式', {time: 2000, icon: 5});
				return false;
			}

			// 关键修复：动态表名提交修改
			http.requestJson(`${table}/update`, 'post', data, function(res) {
				layer.msg('修改成功', {
					time: 2000,
					icon: 6
				}, function() {
					window.location.reload();
				});
			});
			return false; // 阻止表单跳转
		});

	});
</script>
</body>
</html>
