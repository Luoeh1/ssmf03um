<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>填写电子病历</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0;
			padding: 0;
			background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		/* 居中大表单容器 */
		.add-container {
			max-width: 850px;
			margin: 40px auto;
			background: #ffffff;
			border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
			padding: 40px 50px;
			box-sizing: border-box;
		}

		.page-title {
			font-size: 24px;
			color: #1e293b;
			font-weight: 600;
			margin-bottom: 30px;
			text-align: center;
			letter-spacing: 1px;
			position: relative;
			padding-bottom: 15px;
		}
		.page-title::after {
			content: '';
			position: absolute;
			bottom: 0;
			left: 50%;
			transform: translateX(-50%);
			width: 40px;
			height: 4px;
			background: linear-gradient(90deg, #00b4db, #008476);
			border-radius: 2px;
		}

		/* Layui 表单重写 */
		.layui-form-item {
			margin-bottom: 22px;
		}
		.layui-form-label {
			width: 110px;
			padding: 12px 15px 12px 0;
			font-size: 15px;
			color: #475569;
			font-weight: 500;
		}
		.layui-input-block {
			margin-left: 125px;
		}

		.layui-input, .layui-textarea, .layui-select {
			border-radius: 10px !important;
			border: 1px solid #e2e8f0;
			background-color: #f8fafc;
			color: #334155;
			padding-left: 15px;
			transition: all 0.3s;
		}
		.layui-textarea {
			min-height: 100px;
			padding: 15px;
			line-height: 1.6;
		}
		.layui-input:focus, .layui-textarea:focus {
			background-color: #ffffff;
			border-color: #008476;
			box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1);
		}

		/* 只读/禁用状态框的样式 */
		.layui-input[readonly], .layui-textarea[readonly], .layui-input[disabled] {
			background-color: #eef2f5 !important;
			color: #94a3b8;
			cursor: not-allowed;
			border-color: #e2e8f0 !important;
		}

		/* 按钮样式 */
		.btn-container {
			text-align: center;
			margin-top: 40px;
		}
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%);
			color: white;
			border: none;
			padding: 0 45px;
			height: 50px;
			border-radius: 10px;
			font-size: 16px;
			font-weight: 600;
			letter-spacing: 2px;
			cursor: pointer;
			box-shadow: 0 6px 15px rgba(0, 132, 118, 0.3);
			transition: all 0.3s;
			display: inline-block;
		}
		.btn-submit:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(0, 132, 118, 0.4);
		}
		.btn-back {
			background: #ffffff;
			color: #64748b;
			border: 1px solid #cbd5e1;
			padding: 0 35px;
			height: 50px;
			border-radius: 10px;
			font-size: 16px;
			cursor: pointer;
			transition: all 0.3s;
			margin-left: 20px;
			display: inline-block;
		}
		.btn-back:hover {
			color: #1e293b;
			border-color: #94a3b8;
			background: #f8fafc;
		}

		@media (max-width: 768px) {
			.add-container { margin: 20px; padding: 30px 20px; }
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.btn-back { margin-left: 0; margin-top: 15px; display: block; width: 100%; }
			.btn-submit { display: block; width: 100%; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">医疗档案：填写电子病历</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">病历编号：</label>
				<div class="layui-input-block">
					<input v-model="detail.binglibianhao" type="text" :readonly="ro.binglibianhao" name="binglibianhao" id="binglibianhao" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">病历名称：</label>
				<div class="layui-input-block">
					<input v-model="detail.binglimingcheng" type="text" :readonly="ro.binglimingcheng" name="binglimingcheng" id="binglimingcheng" autocomplete="off" class="layui-input" placeholder="请输入病历名称(必填)" lay-verify="required">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">患者账号：</label>
				<div class="layui-input-block">
					<input v-model="detail.zhanghao" type="text" :readonly="ro.zhanghao" name="zhanghao" id="zhanghao" autocomplete="off" class="layui-input" placeholder="患者账号">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">患者姓名：</label>
				<div class="layui-input-block">
					<input v-model="detail.xingming" type="text" :readonly="ro.xingming" name="xingming" id="xingming" autocomplete="off" class="layui-input" placeholder="患者姓名">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">就诊科室：</label>
				<div class="layui-input-block">
					<input v-model="detail.keshi" type="text" :readonly="ro.keshi" name="keshi" id="keshi" autocomplete="off" class="layui-input" placeholder="就诊科室">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">医生账号：</label>
				<div class="layui-input-block">
					<input v-model="detail.yishengzhanghao" type="text" :readonly="ro.yishengzhanghao" name="yishengzhanghao" id="yishengzhanghao" autocomplete="off" class="layui-input" readonly>
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">医生姓名：</label>
				<div class="layui-input-block">
					<input v-model="detail.yishengxingming" type="text" :readonly="ro.yishengxingming" name="yishengxingming" id="yishengxingming" autocomplete="off" class="layui-input" readonly>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">主诉与病状：</label>
				<div class="layui-input-block">
					<textarea v-model="detail.bingzhuang" name="bingzhuang" id="bingzhuang" class="layui-textarea" placeholder="详细描述患者病状及主诉..."></textarea>
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊断结果：</label>
				<div class="layui-input-block">
					<textarea v-model="detail.zhenduanjieguo" name="zhenduanjieguo" id="zhenduanjieguo" class="layui-textarea" placeholder="填写诊断结果..."></textarea>
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">开具药品：</label>
				<div class="layui-input-block">
					<textarea v-model="detail.yaopinxinxi" name="yaopinxinxi" id="yaopinxinxi" class="layui-textarea" placeholder="如需用药请在此处开具..."></textarea>
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">医嘱与建议：</label>
				<div class="layui-input-block">
					<textarea v-model="detail.yizhu" name="yizhu" id="yizhu" class="layui-textarea" placeholder="填写给患者的康复建议及医嘱..."></textarea>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">病历详细记录：</label>
				<div class="layui-input-block">
					<textarea name="xiangqing" id="xiangqing">请输入详细记录内容...</textarea>
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">保存并生成病历</button>
				<button type="button" class="btn-back" @click="back()">取消并返回</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			swiperList: [],
			detail: {
				binglibianhao: genTradeNo(),
				binglimingcheng: '',
				zhanghao: '',
				xingming: '',
				keshi: '',
				bingzhuang: '',
				zhenduanjieguo: '',
				yaopinxinxi: '',
				yizhu: '',
				xiangqing: '',
				yishengzhanghao: '',
				yishengxingming: '',
			},
			ro:{
				binglibianhao : false,
				binglimingcheng : false,
				zhanghao : false,
				xingming : false,
				keshi : false,
				bingzhuang : false,
				zhenduanjieguo : false,
				yaopinxinxi : false,
				yizhu : false,
				xiangqing : false,
				yishengzhanghao : false,
				yishengxingming : false,
			},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() { window.history.back(); }
		}
	})

	layui.use(['layer', 'element', 'http', 'jquery', 'form', 'upload', 'laydate','tinymce'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;
		var form = layui.form;
		var upload = layui.upload;
		var laydate = layui.laydate;
		var tinymce = layui.tinymce;
		vue.baseurl = http.baseurl;

		// Session 身份拉取，如果当前是医生操作，自动填充医生的账号姓名
		var sessionTable = localStorage.getItem('userTable');
		http.request(sessionTable + '/session', 'get', {}, function(res) {
			var json = res.data;
			if(json.yishengzhanghao!=''&&json.yishengzhanghao!=null){
				vue.detail.yishengzhanghao = json.yishengzhanghao
				vue.ro.yishengzhanghao = true;
			}
			if(json.yishengxingming!=''&&json.yishengxingming!=null){
				vue.detail.yishengxingming = json.yishengxingming
				vue.ro.yishengxingming = true;
			}
			// 对于医生字段可能直接是 zhanghao 和 xingming
			if(sessionTable == 'yisheng' && json.zhanghao!=''&&json.zhanghao!=null){
				vue.detail.yishengzhanghao = json.zhanghao
				vue.ro.yishengzhanghao = true;
			}
			if(sessionTable == 'yisheng' && json.xingming!=''&&json.xingming!=null){
				vue.detail.yishengxingming = json.xingming
				vue.ro.yishengxingming = true;
			}
		});

		// 跨表数据填充 (如果是从预约表点过来添加病历的，自动带入患者信息)
		if(localStorage.getItem('crossTable')) {
			var crossTable = localStorage.getItem('crossTable');
			var crossObj = JSON.parse(localStorage.getItem('crossObj'));
			for (var o in crossObj){
				if(o=='binglibianhao'){ vue.detail[o] = crossObj[o]; vue.ro.binglibianhao = true; continue; }
				if(o=='binglimingcheng'){ vue.detail[o] = crossObj[o]; vue.ro.binglimingcheng = true; continue; }
				if(o=='zhanghao'){ vue.detail[o] = crossObj[o]; vue.ro.zhanghao = true; continue; }
				if(o=='xingming'){ vue.detail[o] = crossObj[o]; vue.ro.xingming = true; continue; }
				if(o=='keshi'){ vue.detail[o] = crossObj[o]; vue.ro.keshi = true; continue; }
			}
		}

		// 初始化富文本
		var edit = tinymce.render({
			elem: "#xiangqing",
			height: 400,
			images_upload_handler: function(blobInfo, succFun, failFun) {
				var xhr, formData;
				var file = blobInfo.blob();
				xhr = new XMLHttpRequest();
				xhr.withCredentials = false;
				xhr.open('POST', http.baseurl + 'file/upload');
				xhr.setRequestHeader("Token", localStorage.getItem('Token'));
				xhr.onload = function() {
					var json;
					if (xhr.status != 200) { failFun('HTTP Error: ' + xhr.status); return; }
					json = JSON.parse(xhr.responseText);
					if (!json || typeof json.file != 'string') { failFun('Invalid JSON: ' + xhr.responseText); return; }
					succFun(http.baseurl + 'upload/' + json.file);
				};
				formData = new FormData();
				formData.append('file', file, file.name);
				xhr.send(formData);
			}
		}, (opt) => { });

		// 提交表单
		form.on('submit(*)', function(data) {
			data = data.field;
			// 抓取富文本数据
			var xiangqing = tinymce.get('#xiangqing').getContent()
			data.xiangqing = xiangqing;

			http.requestJson('dianzibingli/add', 'post', data, function(res) {
				layer.msg('电子病历生成成功', {
					time: 2000,
					icon: 6
				}, function() {
					back();
				});
			});
			return false;
		});

	});
</script>
</body>
</html>
