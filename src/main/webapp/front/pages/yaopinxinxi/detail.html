<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>药品详情</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.detail-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }

		.breadcrumb { margin-bottom: 25px; font-size: 15px; color: #64748b; display: flex; align-items: center; }
		.breadcrumb a { color: #475569; text-decoration: none; transition: color 0.3s; }
		.breadcrumb a:hover { color: #008476; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		/* 上半部：图文并排 */
		.info-block {
			background: #ffffff; border-radius: 20px; padding: 30px; display: flex; gap: 40px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); margin-bottom: 30px;
		}

		.img-area {
			flex: 0 0 450px; height: 400px; border-radius: 12px; overflow: hidden;
			background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; padding: 10px; border: 1px solid #f1f5f9;
		}
		.img-area img { max-width: 100%; max-height: 100%; object-fit: contain; }

		.text-area { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
		.main-title { font-size: 28px; color: #1e293b; font-weight: bold; margin: 0 0 15px 0; line-height: 1.3; }

		.price-wrap {
			background: #fef2f2; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; display: inline-block; width: 100%; box-sizing: border-box;
		}
		.price-label { font-size: 14px; color: #ef4444; margin-right: 5px; }
		.price-val { font-size: 32px; color: #ef4444; font-weight: bold; }

		.attr-list {
			background: #f8fafc; border-radius: 12px; padding: 20px 25px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;
		}
		.attr-item { display: flex; font-size: 15px; }
		.attr-item .label { color: #64748b; width: 90px; flex-shrink: 0; }
		.attr-item .val { color: #334155; font-weight: 500; }

		/* 底部操作区（如下单、加入购物车等） */
		.action-area { margin-top: auto; padding-top: 10px; display: flex; gap: 15px; flex-wrap: wrap; }
		.btn-primary {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 35px;
			height: 48px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer;
			box-shadow: 0 4px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s; display: flex; align-items: center; justify-content: center;
		}
		.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 132, 118, 0.4); color: white;}

		.btn-warning {
			background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; border: none; padding: 0 35px;
			height: 48px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer;
			box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); transition: all 0.3s; display: flex; align-items: center; justify-content: center;
		}
		.btn-warning:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4); color: white;}

		/* 下半部：富文本说明 */
		.content-card { background: #ffffff; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); }
		.section-title { font-size: 20px; color: #1e293b; font-weight: 600; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; }
		.section-title::before { content: ''; display: block; width: 4px; height: 18px; background: #008476; border-radius: 2px; margin-right: 10px; }

		.rich-text-content { font-size: 16px; line-height: 1.8; color: #334155; }
		.rich-text-content img { max-width: 100%; border-radius: 8px; margin: 15px 0; }

		@media (max-width: 900px) {
			.info-block { flex-direction: column; }
			.img-area { flex: auto; height: auto; aspect-ratio: 1/1; }
		}
	</style>
</head>
<body>
<div id="app" class="detail-container">

	<div class="breadcrumb">
		<a href="javascript:window.history.back();"><i class="layui-icon layui-icon-left"></i> 返回药品列表</a>
		<span>/</span>
		药品详情
	</div>

	<div class="info-block">
		<div class="img-area">
			<img :src="detail.tupian ? baseurl + detail.tupian.split(',')[0] : '../../layui/images/face/0.gif'">
		</div>

		<div class="text-area">
			<h1 class="main-title">{{detail.yaopinmingcheng}}</h1>

			<div class="price-wrap" v-if="detail.jiage">
				<span class="price-label">零售价</span>
				<span class="price-val">￥{{detail.jiage}}</span>
			</div>

			<div class="attr-list">
				<div class="attr-item" v-if="detail.yaopinfenlei">
					<div class="label">药品分类：</div>
					<div class="val">{{detail.yaopinfenlei}}</div>
				</div>
				<div class="attr-item" v-if="detail.guige">
					<div class="label">包装规格：</div>
					<div class="val">{{detail.guige}}</div>
				</div>
				<div class="attr-item" v-if="detail.shengchanshang">
					<div class="label">生产厂商：</div>
					<div class="val">{{detail.shengchanshang}}</div>
				</div>
				<div class="attr-item" v-if="detail.shengchanriqi">
					<div class="label">生产日期：</div>
					<div class="val">{{detail.shengchanriqi}}</div>
				</div>
				<div class="attr-item" v-if="detail.youxiaoqi">
					<div class="label">有效期至：</div>
					<div class="val" style="color: #ef4444;">{{detail.youxiaoqi}}</div>
				</div>
				<div class="attr-item" v-if="detail.shuliang">
					<div class="label">当前库存：</div>
					<div class="val">{{detail.shuliang}}</div>
				</div>
			</div>

			<div class="action-area">
				<button v-if="isAuth('yaopinxinxi','购买')" @click="onAcrossTap('dingdanxinxi','','','')" type="button" class="btn-primary">
					<i class="layui-icon layui-icon-cart" style="margin-right: 5px;"></i> 立即购买
				</button>
				<button v-if="isAuth('yaopinxinxi','预约药品') || isAuth('yaopinxinxi','预约')" @click="onAcrossTap('yuyueyaopin','','','')" type="button" class="btn-warning">
					<i class="layui-icon layui-icon-form" style="margin-right: 5px;"></i> 预约登记
				</button>
			</div>
		</div>
	</div>

	<div class="content-card">
		<div class="section-title">药品说明书 / 详细介绍</div>
		<div class="rich-text-content" v-html="detail.yaopinxiangqing || detail.xiangqing">
		</div>
	</div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: { id: 0 },
			detailTable: 'yaopinxinxi',
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			isAuth(tablename, button) { return isFrontAuth(tablename, button) },
			// 跨表操作统一保留
			onAcrossTap(tableName, crossOptAudit, statusColumnName, tips, statusColumnValue) {
				localStorage.setItem('crossTable', `yaopinxinxi`);
				localStorage.setItem('crossObj', JSON.stringify(this.detail));
				localStorage.setItem('statusColumnName', statusColumnName);
				localStorage.setItem('statusColumnValue', statusColumnValue);
				localStorage.setItem('tips', tips);
				jump(`../${tableName}/add.html?corss=true`);
			},
		}
	});

	layui.use(['layer', 'http', 'jquery'], function() {
		var layer = layui.layer;
		var http = layui.http;
		var jquery = layui.jquery;

		var id = http.getParam('id');
		vue.detail.id = id;
		vue.baseurl = http.baseurl;

		http.request(`${vue.detailTable}/detail/` + id, 'get', {}, function(res) {
			vue.detail = res.data;
			// 图片路径清洗
			if(vue.detail.tupian && vue.detail.tupian.indexOf('http') == -1) {
				vue.detail.tupian = vue.detail.tupian.replace(http.baseurl,"");
			}

			// 富文本图片路径补全
			let rContent = vue.detail.yaopinxiangqing || vue.detail.xiangqing;
			if(rContent) {
				rContent = rContent.replace(/src="upload\//g, 'src="' + vue.baseurl + 'upload/');
				if(vue.detail.yaopinxiangqing) vue.detail.yaopinxiangqing = rContent;
				if(vue.detail.xiangqing) vue.detail.xiangqing = rContent;
			}
		});
	});
</script>
</body>
</html>
