<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>填写预约信息</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
			min-height: 100vh;
		}
		.add-container {
			max-width: 800px; margin: 40px auto; background: #ffffff;
			border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
			padding: 40px 50px; box-sizing: border-box;
		}
		.page-title {
			font-size: 24px; color: #1e293b; font-weight: 600;
			margin-bottom: 30px; text-align: center; position: relative; padding-bottom: 15px;
		}
		.page-title::after {
			content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
			width: 40px; height: 4px; background: linear-gradient(90deg, #00b4db, #008476); border-radius: 2px;
		}
		.layui-form-item { margin-bottom: 22px; }
		.layui-form-label { width: 110px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; }
		.layui-input-block { margin-left: 125px; }

		.layui-input, .layui-textarea, .layui-select {
			border-radius: 10px !important; border: 1px solid #e2e8f0; background-color: #f8fafc;
			color: #334155; padding-left: 15px; transition: all 0.3s;
		}
		.layui-input:focus, .layui-textarea:focus { background-color: #ffffff; border-color: #008476; box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1); }

		/* 彻底解决下拉框变灰问题，只针对真正的只读输入框置灰 */
		.layui-input[readonly]:not(.layui-unselect), .layui-input[disabled] {
			background-color: #eef2f5 !important; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0 !important;
		}

		.btn-container { text-align: center; margin-top: 40px; }
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none;
			padding: 0 45px; height: 50px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 132, 118, 0.3); }
		.btn-back {
			background: #ffffff; color: #64748b; border: 1px solid #cbd5e1; padding: 0 35px; height: 50px;
			border-radius: 10px; font-size: 16px; cursor: pointer; margin-left: 20px; transition: all 0.3s;
		}
		.btn-back:hover { color: #1e293b; border-color: #94a3b8; background: #f8fafc; }
		.form-tip { font-size: 12px; color: #94a3b8; margin-top: 5px; display: block; }
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">在线预约申请</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">预约编号：</label>
				<div class="layui-input-block">
					<input v-model="detail.yuyuebianhao" type="text" readonly name="yuyuebianhao" id="yuyuebianhao" autocomplete="off" class="layui-input">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗分类：</label>
				<div class="layui-input-block">
					<select name="xiangmufenlei" id="xiangmufenlei" lay-filter="xiangmufenlei" :disabled="ro.xiangmufenlei">
						<option value="">请先选择诊疗分类</option>
						<option v-for="(item,index) in categoryOptions" :key="index" :value="item.xiangmufenlei">{{item.xiangmufenlei}}</option>
					</select>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗名称：</label>
				<div class="layui-input-block">
					<select name="xiangmumingcheng" id="xiangmumingcheng" lay-filter="xiangmumingcheng" :disabled="ro.xiangmumingcheng">
						<option value="">请选择诊疗名称</option>
						<option v-for="(item,index) in projectOptions" :key="index" :value="item.xiangmumingcheng">{{item.xiangmumingcheng}}</option>
					</select>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗位置：</label>
				<div class="layui-input-block">
					<input v-model="detail.keshi" type="text" readonly name="keshi" id="keshi" autocomplete="off" class="layui-input" placeholder="选择诊疗名称后自动带出位置">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">预约时间：</label>
				<div class="layui-input-block">
					<input v-model="detail.yuyueshijian" type="text" name="yuyueshijian" id="yuyueshijian" autocomplete="off" class="layui-input" placeholder="请选择预约时间">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">用户账号：</label>
				<div class="layui-input-block">
					<input v-model="detail.yonghuzhanghao" type="text" readonly name="yonghuzhanghao" id="yonghuzhanghao" autocomplete="off" class="layui-input">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">费用：</label>
				<div class="layui-input-block">
					<input v-model="detail.feiyong" type="text" readonly name="feiyong" id="feiyong" autocomplete="off" class="layui-input" placeholder="选择诊疗名称后自动带出">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">用户姓名：</label>
				<div class="layui-input-block">
					<input v-model="detail.yonghuxingming" type="text" readonly name="yonghuxingming" id="yonghuxingming" autocomplete="off" class="layui-input">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">医生姓名：</label>
				<div class="layui-input-block">
					<select name="yishengxingming" id="yishengxingming" lay-filter="yishengxingming" :disabled="ro.yishengxingming">
						<option value="">请选择接诊医生</option>
						<option v-for="(item,index) in doctorOptions" :key="index" :value="item.yishengxingming">{{item.yishengxingming}}</option>
					</select>
					<span class="form-tip" v-if="!detail.xiangmumingcheng">选择项目后，系统会自动为您匹配并填入对应的医生</span>
				</div>
			</div>
			<input type="hidden" id="yishenggonghao" name="yishenggonghao" :value="detail.yishenggonghao">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">手机：</label>
				<div class="layui-input-block">
					<input v-model="detail.shouji" type="text" readonly name="shouji" id="shouji" autocomplete="off" class="layui-input">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">预约内容：</label>
				<div class="layui-input-block">
					<textarea v-model="detail.yuyueneirong" name="yuyueneirong" id="yuyueneirong" class="layui-textarea" placeholder="请简述您的预约需求或病情..."></textarea>
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">提交预约申请</button>
				<button type="button" class="btn-back" @click="back()">返回上一页</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>
<script src="../../js/jquery.js"></script>

<script>
	var jquery = $;
	var vue = new Vue({
		el: '#app',
		data: {
			categoryOptions: [], // 诊疗分类列表
			allProjects: [],     // 所有诊疗项目
			projectOptions: [],  // 过滤后的项目
			allDoctors: [],      // 所有医生
			doctorOptions: [],   // 过滤后（同科室）的医生
			detail: {
				yuyuebianhao: genTradeNo(),
				xiangmufenlei: '',
				xiangmumingcheng: '',
				keshi: '', // 表面上叫诊疗位置，底层用keshi绑定数据库
				yuyueshijian: '',
				yonghuzhanghao: '',
				feiyong: '',
				yonghuxingming: '',
				yishengxingming: '',
				yishenggonghao: '',
				shouji: '',
				yuyueneirong: '',
				sfsh: '',
				shhf: '',
				ispay: '',
			},
			ro:{
				yuyuebianhao : true,
				xiangmufenlei : false,
				xiangmumingcheng : false,
				keshi : true, // 强制只读
				yuyueshijian : false,
				yonghuzhanghao : true,
				feiyong : true,
				yonghuxingming : true,
				yishengxingming : false,
				yishenggonghao : false,
				shouji : true,
				yuyueneirong : false,
				sfsh : false,
				shhf : false,
				ispay : false,
			},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() {
				if (typeof back === 'function') { back(); } else { window.history.back(); }
			}
		}
	});

	layui.use(['layer', 'element', 'http', 'jquery', 'form', 'laydate'], function() {
		var layer = layui.layer;
		var http = layui.http;
		var form = layui.form;
		var laydate = layui.laydate;
		vue.baseurl = http.baseurl;

		// 1. 预约时间初始化
		jquery('#yuyueshijian').val(getCurDate() || '');
		laydate.render({
			elem: '#yuyueshijian',
			type: 'datetime',
			done: function(value) { vue.detail.yuyueshijian = value; }
		});

		// 2. 获取分类列表
		http.request('xiangmufenlei/list', 'get', { page: 1, limit: 1000 }, function(res) {
			vue.categoryOptions = res.data.list;
		});

		// 3. 全局数据拉取（项目 + 医生）
		http.request('xiangmuxinxi/list', 'get', { page: 1, limit: 1000 }, function(res1) {
			vue.allProjects = res1.data.list;
			vue.projectOptions = vue.allProjects;

			http.request('yisheng/list', 'get', { page: 1, limit: 1000 }, function(res2) {
				vue.allDoctors = res2.data.list;
				vue.doctorOptions = vue.allDoctors;

				handleCrossData();

				// 初始化渲染下拉框
				vue.$nextTick(() => {
					if(vue.detail.xiangmufenlei) jquery('#xiangmufenlei').val(vue.detail.xiangmufenlei);
					if(vue.detail.xiangmumingcheng) jquery('#xiangmumingcheng').val(vue.detail.xiangmumingcheng);
					if(vue.detail.yishengxingming) jquery('#yishengxingming').val(vue.detail.yishengxingming);
					form.render('select');
				});
			});
		});

		// --- 跨表数据赋值 ---
		function handleCrossData() {
			if(http.getParam('cross')){
				var obj = JSON.parse(localStorage.getItem('crossObj'));
				for (var o in obj){
					if(o=='yuyuebianhao'){ vue.detail.yuyuebianhao = obj[o]; continue; }
					if(o=='xiangmufenlei'){ vue.detail.xiangmufenlei = obj[o]; vue.ro.xiangmufenlei = true; continue; }
					if(o=='xiangmumingcheng'){ vue.detail.xiangmumingcheng = obj[o]; vue.ro.xiangmumingcheng = true; continue; }
					if(o=='keshi'){ vue.detail.keshi = obj[o]; continue; }
					if(o=='feiyong'){ vue.detail.feiyong = obj[o]; continue; }
					if(o=='yishenggonghao'){ vue.detail.yishenggonghao = obj[o]; continue; }
					if(o=='yishengxingming'){ vue.detail.yishengxingming = obj[o]; vue.ro.yishengxingming = true; continue; }
				}
				if(vue.detail.xiangmufenlei) {
					vue.projectOptions = vue.allProjects.filter(p => p.xiangmufenlei === vue.detail.xiangmufenlei);
				}
			}
		}

		// --- 超级联动逻辑 ---

		// 事件 A：选【诊疗分类】 -> 过滤项目名称
		form.on('select(xiangmufenlei)', function(data) {
			vue.detail.xiangmufenlei = data.value;
			if(data.value) {
				vue.projectOptions = vue.allProjects.filter(p => p.xiangmufenlei === data.value);
			} else {
				vue.projectOptions = vue.allProjects;
			}

			// 清空下游的脏数据，并用jquery强制清空视图
			vue.detail.xiangmumingcheng = '';
			vue.detail.keshi = '';
			vue.detail.feiyong = '';
			vue.detail.yishengxingming = '';
			vue.detail.yishenggonghao = '';
			vue.doctorOptions = vue.allDoctors;

			jquery('#keshi').val('');
			jquery('#feiyong').val('');

			vue.$nextTick(() => {
				jquery('#xiangmumingcheng').val('');
				jquery('#yishengxingming').val('');
				form.render('select');
			});
		});

		// 事件 B：选【诊疗名称】 -> 真·全自动补全 (位置、费用、医生)
		form.on('select(xiangmumingcheng)', function(data) {
			vue.detail.xiangmumingcheng = data.value;
			let proj = vue.allProjects.find(p => p.xiangmumingcheng === data.value);

			if(proj) {
				// 1. 自动填入诊疗位置(底层叫keshi) 和 费用
				vue.detail.keshi = proj.keshi || '';
				jquery('#keshi').val(vue.detail.keshi); // 强制更新UI

				vue.detail.feiyong = proj.feiyong || '0';
				jquery('#feiyong').val(vue.detail.feiyong); // 强制更新UI

				// 2. 核心：根据项目的科室严格过滤医生
				if(proj.keshi) {
					vue.doctorOptions = vue.allDoctors.filter(d => d.keshi === proj.keshi);
				} else {
					vue.doctorOptions = vue.allDoctors;
				}

				// 3. ✨自动读取医生逻辑：如果该科室有医生，直接自动帮你选中第一个！
				if(vue.doctorOptions.length > 0) {
					let autoDoc = vue.doctorOptions[0];
					vue.detail.yishengxingming = autoDoc.yishengxingming;
					vue.detail.yishenggonghao = autoDoc.yishenggonghao;
					jquery('#yishengxingming').val(autoDoc.yishengxingming);
					jquery('#yishenggonghao').val(autoDoc.yishenggonghao);
				} else {
					vue.detail.yishengxingming = '';
					vue.detail.yishenggonghao = '';
					jquery('#yishengxingming').val('');
					jquery('#yishenggonghao').val('');
				}
			}

			vue.$nextTick(() => {
				form.render('select');
			});
		});

		// 事件 C：选【医生姓名】 (应对用户想手动更换其他同科室医生的情况)
		form.on('select(yishengxingming)', function(data) {
			vue.detail.yishengxingming = data.value;
			let doc = vue.allDoctors.find(d => d.yishengxingming === data.value);
			if(doc) {
				vue.detail.yishenggonghao = doc.yishenggonghao || '';
				jquery('#yishenggonghao').val(doc.yishenggonghao);
			}
			vue.$nextTick(() => form.render('select'));
		});

		// 回显当前登录用户个人信息
		let table = localStorage.getItem("userTable");
		http.request(`${table}/session`, 'get', {}, function(data) {
			data = data.data;
			vue.detail.yonghuzhanghao = data.yonghuzhanghao || data.zhanghao;
			vue.detail.yonghuxingming = data.yonghuxingming || data.xingming;
			vue.detail.shouji = data.shouji || data.dianhuahaoma;
		});

		// 最终表单提交
		form.on('submit(*)', function(data) {
			data = data.field;

			// 给数据库需要、但对用户隐藏的字段赋值，防止被拦截
			data.yishenggonghao = vue.detail.yishenggonghao || jquery('#yishenggonghao').val();

			if(!data.xiangmufenlei){ layer.msg('请选择诊疗分类', { time: 2000, icon: 5 }); return false; }
			if(!data.xiangmumingcheng){ layer.msg('请选择诊疗名称', { time: 2000, icon: 5 }); return false; }
			if(!data.yishengxingming){ layer.msg('请选择或等待系统匹配接诊医生', { time: 2000, icon: 5 }); return false; }

			var crossuserid, crossrefid, crossoptnum;
			if(http.getParam('cross')){
				var statusColumnName = localStorage.getItem('statusColumnName');
				var statusColumnValue = localStorage.getItem('statusColumnValue');
				if(statusColumnName!='') {
					var obj = JSON.parse(localStorage.getItem('crossObj'));
					if(!statusColumnName.startsWith("[")) {
						for (var o in obj){ if(o==statusColumnName){ obj[o] = statusColumnValue; } }
						var crossTable = localStorage.getItem('crossTable');
						http.requestJson(`${crossTable}/update`,'post',obj,(res)=>{});
					} else {
						crossuserid=Number(localStorage.getItem('userid'));
						crossrefid=obj['id'];
						crossoptnum=localStorage.getItem('statusColumnName').replace(/\[|\]/g,"");
					}
				}
			}

			if(crossrefid && crossuserid) {
				data.crossuserid=crossuserid; data.crossrefid=crossrefid;
				http.request('yuyuexinxi/list', 'get', { page: 1, limit: 10, crossuserid:crossuserid, crossrefid:crossrefid }, function(res) {
					if(res.data.total>=crossoptnum) {
						layer.msg(localStorage.getItem('tips'), { time: 2000, icon: 6 }); return false;
					} else {
						submitData(data);
					}
				});
			} else {
				submitData(data);
			}
			return false;
		});

		function submitData(data) {
			http.requestJson('yuyuexinxi/add', 'post', data, function(res) {
				if(res.code === 0 || res.success) {
					layer.msg('预约提交成功', { time: 2000, icon: 6 }, function() { vue.back(); });
				} else {
					layer.msg('提交失败：' + (res.msg || '未知错误'), { time: 2000, icon: 5 });
				}
			});
		}
	});
</script>
</body>
</html>
