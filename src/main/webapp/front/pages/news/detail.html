<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>资讯详情阅读</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0;
			padding: 0;
			background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.article-container {
			max-width: 900px;
			margin: 40px auto;
			padding: 0 20px;
			box-sizing: border-box;
		}

		.breadcrumb {
			margin-bottom: 25px;
			font-size: 15px;
			color: #64748b;
			display: flex;
			align-items: center;
		}
		.breadcrumb a { color: #475569; text-decoration: none; transition: color 0.3s; cursor: pointer; }
		.breadcrumb a:hover { color: #008476; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		.article-card {
			background: #ffffff;
			border-radius: 20px;
			padding: 50px 60px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
		}

		.article-header {
			margin-bottom: 35px;
			text-align: center;
			border-bottom: 1px dashed #e2e8f0;
			padding-bottom: 25px;
		}
		.article-title {
			font-size: 32px;
			color: #1e293b;
			font-weight: bold;
			line-height: 1.4;
			margin: 0 0 20px 0;
		}
		.article-meta {
			font-size: 14px;
			color: #94a3b8;
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 25px;
		}
		.article-meta i {
			margin-right: 6px;
			color: #cbd5e1;
		}

		.article-cover {
			width: 100%;
			border-radius: 12px;
			overflow: hidden;
			margin-bottom: 35px;
			box-shadow: 0 4px 15px rgba(0,0,0,0.05);
		}
		.article-cover img {
			width: 100%;
			max-height: 400px;
			object-fit: cover;
			display: block;
		}

		.rich-text-content {
			font-size: 17px;
			color: #334155;
			line-height: 1.9;
			word-wrap: break-word;
		}
		.rich-text-content p {
			margin-bottom: 20px;
			text-align: justify;
		}
		.rich-text-content img {
			max-width: 100%;
			height: auto;
			border-radius: 8px;
			margin: 20px auto;
			display: block;
			box-shadow: 0 4px 15px rgba(0,0,0,0.03);
		}
		.rich-text-content strong, .rich-text-content b {
			color: #1e293b;
		}
		.rich-text-content a {
			color: #008476;
			text-decoration: none;
			border-bottom: 1px solid rgba(0, 132, 118, 0.3);
		}
		.rich-text-content a:hover {
			border-bottom-color: #008476;
		}

		@media (max-width: 768px) {
			.article-card { padding: 30px 20px; }
			.article-title { font-size: 24px; }
			.article-meta { flex-direction: column; gap: 10px; }
		}
	</style>
</head>
<body>

<div class="article-container">
	<div class="breadcrumb">
		<a onclick="goBack()"><i class="layui-icon layui-icon-left"></i> 返回资讯列表</a>
		<span>/</span>
		正文阅读
	</div>

	<div class="article-card">
		<div class="article-header">
			<h1 class="article-title" id="title"></h1>
			<div class="article-meta">
				<span id="addtime"></span>
				<span id="name"></span>
			</div>
		</div>

		<div class="article-cover" id="coverBox" style="display:none;">
			<img id="coverImg" alt="封面图片">
		</div>

		<div class="rich-text-content" id="content"></div>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	// ========== 强制页面一进来就瞬间置顶 ==========
	history.scrollRestoration = "manual";
	window.scrollTo(0, 0);
	document.documentElement.scrollTop = 0;
	document.body.scrollTop = 0;

	function goBack() {
		window.history.go(-1);
	}

	layui.use(['layer', 'http', 'jquery'], function() {
		var http = layui.http;
		var $ = layui.jquery;
		var baseurl = http.baseurl;
		var id = http.getParam('id');

		http.request('news/detail/' + id, 'get', {}, function(res) {
			var data = res.data;
			$("#title").text(data.title);
			$("#addtime").html('<i class="layui-icon layui-icon-time"></i>发布时间：' + (data.addtime || ''));
			$("#name").html('<i class="layui-icon layui-icon-username"></i>发布人：' + (data.name || ''));

			if (data.picture) {
				$("#coverBox").show();
				$("#coverImg").attr("src", baseurl + data.picture.split(',')[0]);
			}

			if (data.content) {
				data.content = data.content.replace(/src="upload\//g, 'src="' + baseurl + 'upload/');
				$("#content").html(data.content);
			}

			// 最终强制置顶（延迟确保图片加载完也不会跑）
			setTimeout(function(){
				window.scrollTo(0,0);
			}, 80);
		});
	});
</script>
</body>
</html>
