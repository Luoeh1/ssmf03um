<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>资讯详情阅读</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0;
			padding: 0;
			background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		/* 沉浸式阅读居中容器，宽度较窄适合人眼阅读 */
		.article-container {
			max-width: 900px;
			margin: 40px auto;
			padding: 0 20px;
			box-sizing: border-box;
		}

		/* 面包屑导航 */
		.breadcrumb {
			margin-bottom: 25px;
			font-size: 15px;
			color: #64748b;
			display: flex;
			align-items: center;
		}
		.breadcrumb a { color: #475569; text-decoration: none; transition: color 0.3s; cursor: pointer; }
		.breadcrumb a:hover { color: #008476; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		/* 文章主体纯白卡片 */
		.article-card {
			background: #ffffff;
			border-radius: 20px;
			padding: 50px 60px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
		}

		/* 文章头部（标题与元数据） */
		.article-header {
			margin-bottom: 35px;
			text-align: center;
			border-bottom: 1px dashed #e2e8f0;
			padding-bottom: 25px;
		}
		.article-title {
			font-size: 32px;
			color: #1e293b;
			font-weight: bold;
			line-height: 1.4;
			margin: 0 0 20px 0;
		}
		.article-meta {
			font-size: 14px;
			color: #94a3b8;
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 25px;
		}
		.article-meta i {
			margin-right: 6px;
			color: #cbd5e1;
		}

		/* 如果有封面大图，显示在这里 */
		.article-cover {
			width: 100%;
			border-radius: 12px;
			overflow: hidden;
			margin-bottom: 35px;
			box-shadow: 0 4px 15px rgba(0,0,0,0.05);
		}
		.article-cover img {
			width: 100%;
			max-height: 400px;
			object-fit: cover;
			display: block;
		}

		/* 专业富文本排版样式 */
		.rich-text-content {
			font-size: 17px;
			color: #334155;
			line-height: 1.9;
			word-wrap: break-word;
		}
		.rich-text-content p {
			margin-bottom: 20px;
			text-align: justify;
		}
		/* 限制文章内图片大小，并且居中 */
		.rich-text-content img {
			max-width: 100%;
			height: auto;
			border-radius: 8px;
			margin: 20px auto;
			display: block;
			box-shadow: 0 4px 15px rgba(0,0,0,0.03);
		}
		.rich-text-content strong, .rich-text-content b {
			color: #1e293b;
		}
		.rich-text-content a {
			color: #008476;
			text-decoration: none;
			border-bottom: 1px solid rgba(0, 132, 118, 0.3);
		}
		.rich-text-content a:hover {
			border-bottom-color: #008476;
		}

		/* 响应式兼容手机端 */
		@media (max-width: 768px) {
			.article-card { padding: 30px 20px; }
			.article-title { font-size: 24px; }
			.article-meta { flex-direction: column; gap: 10px; }
		}
	</style>
</head>
<body>
<div id="app" class="article-container">

	<div class="breadcrumb">
		<a href="javascript:window.history.back();"><i class="layui-icon layui-icon-left"></i> 返回资讯列表</a>
		<span>/</span>
		正文阅读
	</div>

	<div class="article-card">
		<div class="article-header">
			<h1 class="article-title">{{detail.title}}</h1>
			<div class="article-meta">
				<span v-if="detail.addtime"><i class="layui-icon layui-icon-time"></i>发布时间：{{detail.addtime}}</span>
				<span v-if="detail.name"><i class="layui-icon layui-icon-username"></i>发布人：{{detail.name}}</span>
			</div>
		</div>

		<div class="article-cover" v-if="detail.picture">
			<img :src="detail.picture ? baseurl + detail.picture.split(',')[0] : ''" alt="封面图片">
		</div>

		<div class="rich-text-content" v-html="detail.content">
		</div>
	</div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: {}, // 存放文章详情
			baseurl: ''
		},
		methods: {
			jump(url) {
				jump(url)
			}
		}
	});

	layui.use(['layer', 'element', 'http', 'jquery'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;

		vue.baseurl = http.baseurl;

		// 获取地址栏中的id
		var id = http.getParam('id');

		// 获取新闻详情
		http.request('news/detail/' + id, 'get', {}, function(res) {
			// 如果有封面字段，清洗一下路径
			if(res.data.picture && res.data.picture.indexOf('http') == -1) {
				res.data.picture = res.data.picture.replace(http.baseurl,"");
			}

			// 【核心逻辑】：处理富文本编辑器中上传的图片路径，补全后台接口地址
			if(res.data.content) {
				res.data.content = res.data.content.replace(/src="upload\//g, 'src="' + vue.baseurl + 'upload/');
			}

			vue.detail = res.data;
		});
	});
</script>
</body>
</html>
