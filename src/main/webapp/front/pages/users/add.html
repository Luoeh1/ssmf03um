<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>添加/编辑用户</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f8fafc;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.add-container {
			max-width: 600px; margin: 50px auto; background: #ffffff; border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03); padding: 40px 50px; box-sizing: border-box;
		}

		.page-title {
			font-size: 24px; color: #0f172a; font-weight: 600; margin-bottom: 30px; text-align: center;
			letter-spacing: 1px; position: relative; padding-bottom: 15px;
		}
		.page-title::after {
			content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
			width: 40px; height: 4px; background: linear-gradient(90deg, #6366f1, #4338ca); border-radius: 2px;
		}

		.layui-form-item { margin-bottom: 25px; }
		.layui-form-label { width: 90px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; }
		.layui-input-block { margin-left: 105px; }

		.layui-input {
			border-radius: 10px !important; border: 1px solid #e2e8f0; background-color: #f8fafc; color: #334155;
			padding-left: 15px; height: 46px; transition: all 0.3s;
		}
		.layui-input:focus { background-color: #ffffff; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

		.layui-input[readonly], .layui-input[disabled] {
			background-color: #eef2f5 !important; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0 !important;
		}

		.btn-container { text-align: center; margin-top: 40px; }
		.btn-submit {
			background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); color: white; border: none; padding: 0 45px;
			height: 48px; border-radius: 10px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer;
			box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3); transition: all 0.3s; display: inline-block;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); }
		.btn-back {
			background: #ffffff; color: #64748b; border: 1px solid #cbd5e1; padding: 0 35px; height: 48px;
			border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-left: 20px; display: inline-block;
		}
		.btn-back:hover { color: #1e293b; border-color: #94a3b8; background: #f8fafc; }

		@media (max-width: 768px) {
			.add-container { margin: 20px; padding: 30px 20px; }
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.btn-back { margin-left: 0; margin-top: 15px; display: block; width: 100%; }
			.btn-submit { display: block; width: 100%; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">用户/管理员设置</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">用户名：</label>
				<div class="layui-input-block">
					<input v-model="detail.username" type="text" :readonly="ro.username" name="username" id="username" autocomplete="off" class="layui-input" placeholder="请输入用户名" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">密 码：</label>
				<div class="layui-input-block">
					<input v-model="detail.password" type="text" :readonly="ro.password" name="password" id="password" autocomplete="off" class="layui-input" placeholder="请输入密码" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">角 色：</label>
				<div class="layui-input-block">
					<input v-model="detail.role" type="text" :readonly="ro.role" name="role" id="role" autocomplete="off" class="layui-input" placeholder="请输入角色(如：管理员)">
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">保存用户</button>
				<button type="button" class="btn-back" @click="back()">取消</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: {
				username: '',
				password: '',
				role: '管理员'
			},
			ro:{
				username : false,
				password : false,
				role : false
			},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() { window.history.back(); }
		}
	})

	layui.use(['layer', 'element', 'http', 'jquery', 'form'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;
		var form = layui.form;
		vue.baseurl = http.baseurl;

		// 编辑时获取数据
		var id = http.getParam('id');
		if (id) {
			http.request('users/info/' + id, 'get', {}, function(res) {
				vue.detail = res.data;
			});
		}

		// 提交表单保存
		form.on('submit(*)', function(data) {
			data = data.field;

			let url = id ? 'users/update' : 'users/add';
			if(id){ data.id = id; }

			http.requestJson(url, 'post', data, function(res) {
				layer.msg('保存成功', { time: 2000, icon: 6 }, function() { back(); });
			});
			return false;
		});

	});
</script>
</body>
</html>
