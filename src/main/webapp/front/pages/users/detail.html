<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>用户详情</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f8fafc;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.detail-container { max-width: 800px; margin: 50px auto; padding: 0 20px; box-sizing: border-box; }

		.breadcrumb { margin-bottom: 25px; font-size: 15px; color: #64748b; display: flex; align-items: center; }
		.breadcrumb a { color: #475569; text-decoration: none; transition: color 0.3s; }
		.breadcrumb a:hover { color: #4f46e5; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		.profile-card {
			background: #ffffff; border-radius: 20px; padding: 50px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); display: flex; flex-direction: column; align-items: center;
		}

		.avatar-area {
			width: 120px; height: 120px; border-radius: 50%; background: #e2e8f0;
			display: flex; justify-content: center; align-items: center; margin-bottom: 20px;
			border: 5px solid #f1f5f9; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
		}
		.avatar-area i { font-size: 60px; color: #94a3b8; }

		.username { font-size: 28px; color: #1e293b; font-weight: bold; margin-bottom: 10px; }
		.role-tag {
			background: #e0e7ff; color: #4338ca; padding: 6px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 40px;
		}

		.info-grid {
			width: 100%; display: grid; grid-template-columns: 1fr; gap: 20px;
			background: #f8fafc; padding: 30px; border-radius: 12px;
		}
		.info-item { display: flex; font-size: 16px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px; }
		.info-item:last-child { border-bottom: none; padding-bottom: 0; }
		.info-item .label { color: #64748b; width: 120px; flex-shrink: 0; }
		.info-item .val { color: #0f172a; font-weight: 500; }

		/* 保留可能的跨表操作按钮区域 */
		.action-area { margin-top: 40px; }
		.btn-primary {
			background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); color: white; border: none; padding: 0 35px;
			height: 48px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer;
			box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); transition: all 0.3s;
		}
		.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4); color: white;}

	</style>
</head>
<body>
<div id="app" class="detail-container">

	<div class="breadcrumb">
		<a href="javascript:window.history.back();"><i class="layui-icon layui-icon-left"></i> 返回列表</a>
		<span>/</span>
		用户详情
	</div>

	<div class="profile-card">
		<div class="avatar-area">
			<i class="layui-icon layui-icon-user"></i>
		</div>
		<div class="username">{{detail.username}}</div>
		<div class="role-tag">{{detail.role || '系统管理员'}}</div>

		<div class="info-grid">
			<div class="info-item">
				<div class="label">用户ID：</div>
				<div class="val">{{detail.id}}</div>
			</div>
			<div class="info-item" v-if="detail.username">
				<div class="label">登录账号：</div>
				<div class="val">{{detail.username}}</div>
			</div>
			<div class="info-item" v-if="detail.addtime">
				<div class="label">添加时间：</div>
				<div class="val">{{detail.addtime}}</div>
			</div>
		</div>

		<div class="action-area" v-if="isAuth('users','修改')">
			<button @click="jump('../users/add.html?id='+detail.id)" class="btn-primary">编辑用户信息</button>
		</div>
	</div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: { id: 0 },
			detailTable: 'users',
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			isAuth(tablename, button) { return isFrontAuth(tablename, button) }
		}
	});

	layui.use(['layer', 'http', 'jquery'], function() {
		var layer = layui.layer;
		var http = layui.http;
		var jquery = layui.jquery;

		var id = http.getParam('id');
		vue.detail.id = id;
		vue.baseurl = http.baseurl;

		http.request(`${vue.detailTable}/detail/` + id, 'get', {}, function(res) {
			vue.detail = res.data;
		});
	});
</script>
</body>
</html>
