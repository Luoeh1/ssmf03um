<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>医生工作台 - 个人中心</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.center-container {
			max-width: 1400px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; box-sizing: border-box; align-items: flex-start;
		}

		/* 左侧菜单栏 */
		.left-menu {
			flex: 0 0 260px; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); overflow: hidden; position: sticky; top: 100px;
		}

		.user-profile-header {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); padding: 40px 20px 30px; text-align: center; color: #ffffff;
		}
		.user-profile-header .avatar-wrap {
			width: 90px; height: 90px; border-radius: 50%; border: 4px solid rgba(255, 255, 255, 0.3);
			margin: 0 auto 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff;
		}
		.user-profile-header .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
		.user-profile-header .user-name { font-size: 18px; font-weight: 600; margin-bottom: 5px; letter-spacing: 1px; }
		.user-profile-header .user-role { font-size: 13px; color: rgba(255, 255, 255, 0.9); font-weight: 500; }

		.layui-nav-tree { width: 100% !important; background: transparent !important; }
		.layui-nav-tree .layui-nav-item { line-height: 50px; margin: 5px 15px; border-radius: 12px; }
		.layui-nav-tree .layui-nav-item a { color: #475569 !important; font-size: 15px; border-radius: 12px; transition: all 0.3s ease; padding: 0 20px !important; }
		.layui-nav-tree .layui-nav-item a:hover { background: rgba(0, 132, 118, 0.05) !important; color: #008476 !important; transform: translateX(5px); }
		.layui-nav-tree .layui-this > a, .layui-nav-tree .layui-this > a:hover {
			background: #008476 !important; color: #ffffff !important; font-weight: bold; box-shadow: 0 4px 12px rgba(0, 132, 118, 0.2); transform: translateX(0);
		}
		.layui-nav-tree .layui-nav-bar { display: none; }

		/* 右侧表单区 */
		.right-content {
			flex: 1; background: #ffffff; border-radius: 20px; padding: 40px 50px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); min-height: 600px;
		}
		.section-title {
			font-size: 22px; color: #1e293b; font-weight: 600; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center;
		}
		.section-title::before { content: ''; display: block; width: 5px; height: 20px; background: #008476; border-radius: 4px; margin-right: 12px; }

		.layui-form-item { margin-bottom: 25px; }
		.layui-form-label { width: 100px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; text-align: right; }
		.layui-input-block { margin-left: 115px; max-width: 650px; }
		.layui-input { height: 46px; border-radius: 10px; border: 1px solid #e2e8f0; background-color: #f8fafc; color: #334155; padding-left: 15px; transition: all 0.3s; }
		.layui-input:focus { background-color: #ffffff; border-color: #008476; box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1); }
		.layui-input[readonly] { background-color: #e2e8f0; color: #94a3b8; cursor: not-allowed; }

		.layui-form-radio { margin: 6px 15px 0 0; }
		.layui-form-radio>i { color: #cbd5e1; font-size: 20px; }
		.layui-form-radioed>i { color: #008476 !important; }
		.layui-form-radio>div { color: #475569; }
		.layui-form-radioed>div { color: #008476 !important; font-weight: bold; }

		.upload-img-wrap { display: flex; align-items: center; gap: 20px; }
		.upload-img-wrap img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px dashed #e2e8f0; padding: 2px; }
		.btn-upload { background: #ffffff; color: #008476; border: 1px solid #008476; height: 38px; line-height: 38px; padding: 0 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: inline-block; }
		.btn-upload:hover { background: rgba(0, 132, 118, 0.05); transform: translateY(-2px); }

		.form-actions { margin-top: 40px; margin-left: 115px; }
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 40px; height: 48px;
			border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 6px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 132, 118, 0.4); }

		@media (max-width: 900px) {
			.center-container { flex-direction: column; }
			.left-menu { width: 100%; flex: auto; position: relative; top: 0; }
			.right-content { padding: 30px 20px; width: 100%; box-sizing: border-box; }
			.layui-input-block { margin-left: 0; max-width: 100%; }
			.layui-form-label { display: block; text-align: left; width: auto; padding-bottom: 5px; }
			.form-actions { margin-left: 0; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="center-container">

		<div class="left-menu">
			<div class="user-profile-header">
				<div class="avatar-wrap">
					<img :src="sessionForm.touxiang ? baseurl + sessionForm.touxiang : '../../layui/images/face/0.gif'" alt="头像">
				</div>
				<div class="user-name">{{sessionForm.yishengxingming || sessionForm.yishengzhanghao || '医疗专家'}}</div>
				<div class="user-role">{{sessionForm.zhicheng || '医生账号'}} | {{sessionForm.keshi || '全科'}}</div>
			</div>

			<ul class="layui-nav layui-nav-tree">
				<li v-for="(item,index) in centerMenu" v-bind:key="index" class="layui-nav-item" :class="index==0?'layui-this':''">
					<a :href="'javascript:jump(\''+item.url+'\')'">{{item.name}}</a>
				</li>
			</ul>
		</div>

		<div class="right-content">
			<div class="section-title">专家基本信息维护</div>

			<form class="layui-form" lay-filter="myForm">
				<div class="layui-form-item">
					<label class="layui-form-label">医生账号</label>
					<div class="layui-input-block">
						<input type="text" name="yishengzhanghao" id="yishengzhanghao" placeholder="医生账号" autocomplete="off" class="layui-input" readonly>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">密码</label>
					<div class="layui-input-block">
						<input type="password" name="mima" id="mima" placeholder="如需修改请填写新密码" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">医生姓名</label>
					<div class="layui-input-block">
						<input type="text" name="yishengxingming" id="yishengxingming" placeholder="真实姓名" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">医生头像</label>
					<div class="layui-input-block">
						<div class="upload-img-wrap">
							<img id="touxiangImg" src="../../layui/images/face/0.gif" alt="头像预览">
							<input type="hidden" id="touxiang" name="touxiang" />
							<button type="button" class="btn-upload" id="touxiangUpload">
								<i class="layui-icon">&#xe67c;</i> 上传工作照
							</button>
						</div>
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">性别</label>
					<div class="layui-input-block">
						<input type="radio" name="yishengxingbie" value="男" title="男" checked>
						<input type="radio" name="yishengxingbie" value="女" title="女">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">医生工号</label>
					<div class="layui-input-block">
						<input type="text" name="yishenggonghao" id="yishenggonghao" placeholder="工号/执业编号" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">所属科室</label>
					<div class="layui-input-block">
						<input type="text" name="keshi" id="keshi" placeholder="所在科室名称" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">职称</label>
					<div class="layui-input-block">
						<input type="text" name="zhicheng" id="zhicheng" placeholder="例如：主任医师/副主任医师" autocomplete="off" class="layui-input">
					</div>
				</div>
				<div class="layui-form-item">
					<label class="layui-form-label">联系电话</label>
					<div class="layui-input-block">
						<input type="text" name="lianxidianhua" id="lianxidianhua" placeholder="工作手机号" autocomplete="off" class="layui-input">
					</div>
				</div>

				<div class="form-actions">
					<button class="btn-submit" lay-submit lay-filter="*">更新档案资料</button>
				</div>
			</form>
		</div>

	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			centerMenu: centerMenu,
			sessionForm: {},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) }
		}
	})

	layui.use(['layer', 'element', 'form', 'http', 'jquery', 'upload'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var form = layui.form;
		var http = layui.http;
		var jquery = layui.jquery;
		var upload = layui.upload;

		vue.baseurl = http.baseurl;

		// 获取登录医生信息
		http.request('session', 'get', {}, function(res) {
			vue.sessionForm = res.data;
			// 表单初始赋值
			form.val("myForm", res.data);

			if(res.data.touxiang){
				jquery('#touxiangImg').attr('src', http.baseurl + res.data.touxiang);
				jquery('#touxiang').val(res.data.touxiang);
			}
			element.render('nav');
		});

		// 医生工作照上传
		var touxiangUpload = upload.render({
			elem: '#touxiangUpload',
			url: http.baseurl + 'file/upload',
			headers: { 'Token': localStorage.getItem('Token') },
			accept: 'images',
			before: function() { layer.load(1); },
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#touxiang').val(url);
					jquery('#touxiangImg').attr('src', http.baseurl + url);
					vue.sessionForm.touxiang = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			}
		});

		// 表单提交事件
		form.on('submit(*)', function(data) {
			data = data.field;

			if(!data.yishengzhanghao){ layer.msg('账号不能为空', {time: 2000,icon: 5}); return false; }
			if(!data.mima){ layer.msg('密码不能为空', {time: 2000,icon: 5}); return false; }
			if(!data.yishengxingming){ layer.msg('姓名不能为空', {time: 2000,icon: 5}); return false; }
			if(data.lianxidianhua && !isMobile(data.lianxidianhua)){
				layer.msg('联系电话应输入手机格式', {time: 2000,icon: 5}); return false;
			}

			http.requestJson('yisheng/update', 'post', data, function(res) {
				layer.msg('档案资料更新成功', { time: 2000, icon: 6 }, function() {
					window.location.reload();
				});
			});
			return false;
		});

	});
</script>
</body>
</html>
