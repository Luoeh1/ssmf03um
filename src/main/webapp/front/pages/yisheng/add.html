<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>录入/编辑医生信息</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.add-container {
			max-width: 850px; margin: 40px auto; background: #ffffff; border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); padding: 40px 50px; box-sizing: border-box;
		}

		.page-title {
			font-size: 24px; color: #1e293b; font-weight: 600; margin-bottom: 30px; text-align: center;
			letter-spacing: 1px; position: relative; padding-bottom: 15px;
		}
		.page-title::after {
			content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
			width: 40px; height: 4px; background: linear-gradient(90deg, #00b4db, #008476); border-radius: 2px;
		}

		.layui-form-item { margin-bottom: 22px; }
		.layui-form-label { width: 110px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; }
		.layui-input-block { margin-left: 125px; }

		.layui-input, .layui-textarea, .layui-select {
			border-radius: 10px !important; border: 1px solid #e2e8f0; background-color: #f8fafc; color: #334155;
			padding-left: 15px; transition: all 0.3s; height: 46px;
		}
		.layui-textarea { min-height: 100px; padding: 15px; line-height: 1.6; height: auto;}
		.layui-input:focus, .layui-textarea:focus { background-color: #ffffff; border-color: #008476; box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1); }

		.layui-input[readonly], .layui-textarea[readonly], .layui-input[disabled] {
			background-color: #eef2f5 !important; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0 !important;
		}

		.upload-area {
			border: 2px dashed #cbd5e1; border-radius: 12px; padding: 20px; text-align: center;
			background: #f8fafc; transition: all 0.3s; display: inline-block; min-width: 250px;
		}
		.upload-area:hover { border-color: #008476; background: #f0fdfa; }
		.upload-preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 15px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
		.btn-upload-pic { background: #ffffff; border: 1px solid #008476; color: #008476; padding: 0 25px; height: 42px; border-radius: 8px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 5px; margin: 0 auto; }
		.btn-upload-pic:hover { background: rgba(0, 132, 118, 0.05); transform: translateY(-2px); }

		/* 单选框美化 */
		.layui-form-radio { margin: 6px 15px 0 0; }
		.layui-form-radio>i { color: #cbd5e1; font-size: 20px; }
		.layui-form-radioed>i { color: #008476 !important; }
		.layui-form-radio>div { color: #475569; }
		.layui-form-radioed>div { color: #008476 !important; font-weight: bold; }

		.btn-container { text-align: center; margin-top: 40px; }
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 45px;
			height: 50px; border-radius: 10px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer;
			box-shadow: 0 6px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s; display: inline-block;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 132, 118, 0.4); }
		.btn-back {
			background: #ffffff; color: #64748b; border: 1px solid #cbd5e1; padding: 0 35px; height: 50px;
			border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-left: 20px; display: inline-block;
		}
		.btn-back:hover { color: #1e293b; border-color: #94a3b8; background: #f8fafc; }

		@media (max-width: 768px) {
			.add-container { margin: 20px; padding: 30px 20px; }
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.btn-back { margin-left: 0; margin-top: 15px; display: block; width: 100%; }
			.btn-submit { display: block; width: 100%; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">医疗专家档案维护</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">医生账号：</label>
				<div class="layui-input-block">
					<input v-model="detail.yishengzhanghao" type="text" :readonly="ro.yishengzhanghao" name="yishengzhanghao" id="yishengzhanghao" autocomplete="off" class="layui-input" placeholder="输入医生账号(必填)" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">密码：</label>
				<div class="layui-input-block">
					<input v-model="detail.mima" type="password" :readonly="ro.mima" name="mima" id="mima" autocomplete="off" class="layui-input" placeholder="输入密码(必填)" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">医生姓名：</label>
				<div class="layui-input-block">
					<input v-model="detail.yishengxingming" type="text" :readonly="ro.yishengxingming" name="yishengxingming" id="yishengxingming" autocomplete="off" class="layui-input" placeholder="真实姓名(必填)" lay-verify="required">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">医生头像：</label>
				<div class="layui-input-block">
					<div class="upload-area">
						<button type="button" class="btn-upload-pic" id="touxiangUpload">
							<i class="layui-icon layui-icon-upload-drag"></i> 上传职业照
						</button>
						<input type="hidden" id="touxiang" name="touxiang" v-model="detail.touxiang" />
						<div>
							<img id="touxiangImg" class="upload-preview" src="">
						</div>
					</div>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">性别：</label>
				<div class="layui-input-block">
					<input type="radio" v-model="detail.yishengxingbie" name="yishengxingbie" value="男" title="男" checked>
					<input type="radio" v-model="detail.yishengxingbie" name="yishengxingbie" value="女" title="女">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">医生工号：</label>
				<div class="layui-input-block">
					<input v-model="detail.yishenggonghao" type="text" :readonly="ro.yishenggonghao" name="yishenggonghao" id="yishenggonghao" autocomplete="off" class="layui-input" placeholder="执业工号">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">职称：</label>
				<div class="layui-input-block">
					<input v-model="detail.zhicheng" type="text" :readonly="ro.zhicheng" name="zhicheng" id="zhicheng" autocomplete="off" class="layui-input" placeholder="如：主任医师">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">所属科室：</label>
				<div class="layui-input-block">
					<input v-model="detail.keshi" type="text" :readonly="ro.keshi" name="keshi" id="keshi" autocomplete="off" class="layui-input" placeholder="所属科室(如：内科)">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">联系电话：</label>
				<div class="layui-input-block">
					<input v-model="detail.lianxidianhua" type="text" :readonly="ro.lianxidianhua" name="lianxidianhua" id="lianxidianhua" autocomplete="off" class="layui-input" placeholder="手机号码" lay-verify="phone">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">个人简介：</label>
				<div class="layui-input-block">
					<textarea name="gerenjianjie" id="gerenjianjie">在此填写医生详细的教育背景、工作经历及擅长领域...</textarea>
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">保存专家档案</button>
				<button type="button" class="btn-back" @click="back()">取消并返回</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: {
				yishengzhanghao: '',
				mima: '',
				yishengxingming: '',
				touxiang: '',
				yishengxingbie: '男',
				yishenggonghao: '',
				zhicheng: '',
				keshi: '',
				lianxidianhua: '',
				gerenjianjie: ''
			},
			ro:{
				yishengzhanghao : false,
				mima : false,
				yishengxingming : false,
				touxiang : false,
				yishengxingbie : false,
				yishenggonghao : false,
				zhicheng : false,
				keshi : false,
				lianxidianhua : false,
				gerenjianjie : false
			},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() { window.history.back(); }
		}
	})

	layui.use(['layer', 'element', 'http', 'jquery', 'form', 'upload', 'tinymce'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;
		var form = layui.form;
		var upload = layui.upload;
		var tinymce = layui.tinymce;
		vue.baseurl = http.baseurl;

		// 头像上传
		var touxiangUpload = upload.render({
			elem: '#touxiangUpload',
			url: http.baseurl + 'file/upload',
			headers: { 'Token': localStorage.getItem('Token') },
			accept: 'images',
			before: function() { layer.load(1); },
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#touxiang').val(url);
					jquery('#touxiangImg').attr('src', http.baseurl + url).css('display', 'inline-block');
					vue.detail.tupian = url; // 兼容不同变量
					vue.detail.touxiang = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			},
			error: function() { layer.closeAll('loading'); layer.msg("请求接口异常", { time: 2000, icon: 5 }); }
		});

		// 跨表传参
		if(localStorage.getItem('crossTable')) {
			var crossTable = localStorage.getItem('crossTable');
			var crossObj = JSON.parse(localStorage.getItem('crossObj'));
			for (var o in crossObj){
				if(o=='yishengzhanghao'){ vue.detail[o] = crossObj[o]; vue.ro.yishengzhanghao = true; continue; }
				if(o=='yishengxingming'){ vue.detail[o] = crossObj[o]; vue.ro.yishengxingming = true; continue; }
				if(o=='keshi'){ vue.detail[o] = crossObj[o]; vue.ro.keshi = true; continue; }
				if(o=='lianxidianhua'){ vue.detail[o] = crossObj[o]; vue.ro.lianxidianhua = true; continue; }
			}
		}

		// 修改时的回显
		var id = http.getParam('id');
		if (id) {
			http.request('yisheng/info/' + id, 'get', {}, function(res) {
				vue.detail = res.data;
				// 回显性别单选框
				jquery("input[name='yishengxingbie'][value='"+vue.detail.yishengxingbie+"']").attr("checked",true);
				form.render('radio');
				// 回显图片
				if(vue.detail.touxiang) {
					var tupianArr = vue.detail.touxiang.split(',');
					jquery('#touxiangImg').attr('src', http.baseurl + tupianArr[0]).css('display', 'inline-block');
				}
			});
		}

		// 富文本编辑器
		var edit = tinymce.render({
			elem: "#gerenjianjie",
			height: 400,
			images_upload_handler: function(blobInfo, succFun, failFun) {
				var xhr, formData;
				var file = blobInfo.blob();
				xhr = new XMLHttpRequest();
				xhr.withCredentials = false;
				xhr.open('POST', http.baseurl + 'file/upload');
				xhr.setRequestHeader("Token", localStorage.getItem('Token'));
				xhr.onload = function() {
					var json;
					if (xhr.status != 200) { failFun('HTTP Error: ' + xhr.status); return; }
					json = JSON.parse(xhr.responseText);
					if (!json || typeof json.file != 'string') { failFun('Invalid JSON: ' + xhr.responseText); return; }
					succFun(http.baseurl + 'upload/' + json.file);
				};
				formData = new FormData();
				formData.append('file', file, file.name);
				xhr.send(formData);
			}
		}, (opt) => { });

		// 提交表单保存
		form.on('submit(*)', function(data) {
			data = data.field;

			// 同步富文本
			var rContent = tinymce.get('#gerenjianjie').getContent();
			data.gerenjianjie = rContent;
			data.xiangqing = rContent;

			let url = id ? 'yisheng/update' : 'yisheng/add';
			if(id) { data.id = id; }

			http.requestJson(url, 'post', data, function(res) {
				layer.msg('操作成功', { time: 2000, icon: 6 }, function() { back(); });
			});
			return false;
		});

	});
</script>
</body>
</html>
