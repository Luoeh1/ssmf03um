<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>录入检查报告</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0;
			padding: 0;
			background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.add-container {
			max-width: 850px;
			margin: 40px auto;
			background: #ffffff;
			border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
			padding: 40px 50px;
			box-sizing: border-box;
		}

		.page-title {
			font-size: 24px;
			color: #1e293b;
			font-weight: 600;
			margin-bottom: 30px;
			text-align: center;
			letter-spacing: 1px;
			position: relative;
			padding-bottom: 15px;
		}
		.page-title::after {
			content: '';
			position: absolute;
			bottom: 0;
			left: 50%;
			transform: translateX(-50%);
			width: 40px;
			height: 4px;
			/* 科技蓝色底边 */
			background: linear-gradient(90deg, #3b82f6, #2563eb);
			border-radius: 2px;
		}

		.layui-form-item { margin-bottom: 22px; }
		.layui-form-label { width: 110px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; }
		.layui-input-block { margin-left: 125px; }

		.layui-input, .layui-textarea, .layui-select {
			border-radius: 10px !important; border: 1px solid #e2e8f0;
			background-color: #f8fafc; color: #334155; padding-left: 15px; transition: all 0.3s;
		}
		.layui-textarea { min-height: 100px; padding: 15px; line-height: 1.6; }
		.layui-input:focus, .layui-textarea:focus { background-color: #ffffff; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

		.layui-input[readonly], .layui-textarea[readonly], .layui-input[disabled] {
			background-color: #eef2f5 !important; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0 !important;
		}

		/* 影像上传美化 */
		.upload-area {
			border: 2px dashed #cbd5e1;
			border-radius: 12px;
			padding: 20px;
			text-align: center;
			background: #f8fafc;
			transition: all 0.3s;
		}
		.upload-area:hover { border-color: #3b82f6; background: #eff6ff; }
		.upload-preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 15px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
		.btn-upload-pic { background: #ffffff; border: 1px solid #3b82f6; color: #3b82f6; padding: 0 25px; height: 40px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
		.btn-upload-pic:hover { background: rgba(59, 130, 246, 0.05); transform: translateY(-2px); }

		/* 按钮区 */
		.btn-container { text-align: center; margin-top: 40px; }
		.btn-submit {
			background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; padding: 0 45px;
			height: 50px; border-radius: 10px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer;
			box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3); transition: all 0.3s; display: inline-block;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }
		.btn-back {
			background: #ffffff; color: #64748b; border: 1px solid #cbd5e1; padding: 0 35px; height: 50px;
			border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-left: 20px; display: inline-block;
		}
		.btn-back:hover { color: #1e293b; border-color: #94a3b8; background: #f8fafc; }

		@media (max-width: 768px) {
			.add-container { margin: 20px; padding: 30px 20px; }
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.btn-back { margin-left: 0; margin-top: 15px; display: block; width: 100%; }
			.btn-submit { display: block; width: 100%; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">医疗档案：录入检验检查报告</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">报告编号：</label>
				<div class="layui-input-block">
					<input v-model="detail.baogaobianhao" type="text" :readonly="ro.baogaobianhao" name="baogaobianhao" id="baogaobianhao" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">报告名称：</label>
				<div class="layui-input-block">
					<input v-model="detail.baogaomingcheng" type="text" :readonly="ro.baogaomingcheng" name="baogaomingcheng" id="baogaomingcheng" autocomplete="off" class="layui-input" placeholder="请输入检验报告名称(必填)" lay-verify="required">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">患者账号：</label>
				<div class="layui-input-block">
					<input v-model="detail.zhanghao" type="text" :readonly="ro.zhanghao" name="zhanghao" id="zhanghao" autocomplete="off" class="layui-input" placeholder="患者账号">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">患者姓名：</label>
				<div class="layui-input-block">
					<input v-model="detail.xingming" type="text" :readonly="ro.xingming" name="xingming" id="xingming" autocomplete="off" class="layui-input" placeholder="患者姓名">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">检验诊疗：</label>
				<div class="layui-input-block">
					<input v-model="detail.jianchaxiangmu" type="text" :readonly="ro.jianchaxiangmu" name="jianchaxiangmu" id="jianchaxiangmu" autocomplete="off" class="layui-input" placeholder="例如：血常规、B超等">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">检验时间：</label>
				<div class="layui-input-block">
					<input type="text" name="jianchashijian" id="jianchashijian" autocomplete="off" class="layui-input" placeholder="请选择检验出结果的时间">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">原件影像：</label>
				<div class="layui-input-block">
					<div class="upload-area">
						<button type="button" class="btn-upload-pic" id="tupianUpload">
							<i class="layui-icon layui-icon-upload-drag"></i> 上传扫描件/影像图
						</button>
						<input type="hidden" id="tupian" name="tupian" v-model="detail.tupian" />
						<div>
							<img id="tupianImg" class="upload-preview" src="">
						</div>
					</div>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">检验结果：</label>
				<div class="layui-input-block">
					<textarea v-model="detail.jianchajieguo" name="jianchajieguo" id="jianchajieguo" class="layui-textarea" placeholder="请简要填写检验指标是否异常、或最终结论..."></textarea>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">录入医生：</label>
				<div class="layui-input-block">
					<input v-model="detail.yishengxingming" type="text" :readonly="ro.yishengxingming" name="yishengxingming" id="yishengxingming" autocomplete="off" class="layui-input" readonly>
					<input type="hidden" v-model="detail.yishengzhanghao" name="yishengzhanghao">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">详细数据表：</label>
				<div class="layui-input-block">
					<textarea name="baogaoxiangqing" id="baogaoxiangqing">可在此处插入详细数据表格或指标分析...</textarea>
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">保存报告并归档</button>
				<button type="button" class="btn-back" @click="back()">取消录入</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: {
				baogaobianhao: genTradeNo(),
				baogaomingcheng: '',
				zhanghao: '',
				xingming: '',
				jianchaxiangmu: '',
				jianchajieguo: '',
				tupian: '',
				baogaoxiangqing: '',
				jianchashijian: '',
				yishengzhanghao: '',
				yishengxingming: '',
			},
			ro:{
				baogaobianhao : false,
				baogaomingcheng : false,
				zhanghao : false,
				xingming : false,
				jianchaxiangmu : false,
				jianchajieguo : false,
				tupian : false,
				baogaoxiangqing : false,
				jianchashijian : false,
				yishengzhanghao : false,
				yishengxingming : false,
			},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() { window.history.back(); }
		}
	})

	layui.use(['layer', 'element', 'http', 'jquery', 'form', 'upload', 'laydate','tinymce'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;
		var form = layui.form;
		var upload = layui.upload;
		var laydate = layui.laydate;
		var tinymce = layui.tinymce;
		vue.baseurl = http.baseurl;

		// 初始化时间选择器
		laydate.render({
			elem: '#jianchashijian',
			type: 'datetime'
		});

		// 自动拉取当前登录医生的身份信息
		var sessionTable = localStorage.getItem('userTable');
		http.request(sessionTable + '/session', 'get', {}, function(res) {
			var json = res.data;
			if(json.yishengzhanghao!=''&&json.yishengzhanghao!=null){
				vue.detail.yishengzhanghao = json.yishengzhanghao;
				vue.ro.yishengzhanghao = true;
			}
			if(json.yishengxingming!=''&&json.yishengxingming!=null){
				vue.detail.yishengxingming = json.yishengxingming;
				vue.ro.yishengxingming = true;
			}
			if(sessionTable == 'yisheng' && json.zhanghao!=''&&json.zhanghao!=null){
				vue.detail.yishengzhanghao = json.zhanghao;
				vue.ro.yishengzhanghao = true;
			}
			if(sessionTable == 'yisheng' && json.xingming!=''&&json.xingming!=null){
				vue.detail.yishengxingming = json.xingming;
				vue.ro.yishengxingming = true;
			}
		});

		// 图片扫描件上传组件
		var tupianUpload = upload.render({
			elem: '#tupianUpload',
			url: http.baseurl + 'file/upload',
			headers: { 'Token': localStorage.getItem('Token') },
			accept: 'images',
			before: function() { layer.load(1); },
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#tupian').val(url);
					// 预览图片并显示
					jquery('#tupianImg').attr('src', http.baseurl + url).css('display', 'inline-block');
					vue.detail.tupian = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			},
			error: function() { layer.closeAll('loading'); layer.msg("请求接口异常", { time: 2000, icon: 5 }); }
		});

		// 跨表数据填充机制
		if(localStorage.getItem('crossTable')) {
			var crossTable = localStorage.getItem('crossTable');
			var crossObj = JSON.parse(localStorage.getItem('crossObj'));
			for (var o in crossObj){
				if(o=='baogaobianhao'){ vue.detail[o] = crossObj[o]; vue.ro.baogaobianhao = true; continue; }
				if(o=='baogaomingcheng'){ vue.detail[o] = crossObj[o]; vue.ro.baogaomingcheng = true; continue; }
				if(o=='zhanghao'){ vue.detail[o] = crossObj[o]; vue.ro.zhanghao = true; continue; }
				if(o=='xingming'){ vue.detail[o] = crossObj[o]; vue.ro.xingming = true; continue; }
			}
		}

		// 富文本渲染
		var edit = tinymce.render({
			elem: "#baogaoxiangqing",
			height: 400,
			images_upload_handler: function(blobInfo, succFun, failFun) {
				var xhr, formData;
				var file = blobInfo.blob();
				xhr = new XMLHttpRequest();
				xhr.withCredentials = false;
				xhr.open('POST', http.baseurl + 'file/upload');
				xhr.setRequestHeader("Token", localStorage.getItem('Token'));
				xhr.onload = function() {
					var json;
					if (xhr.status != 200) { failFun('HTTP Error: ' + xhr.status); return; }
					json = JSON.parse(xhr.responseText);
					if (!json || typeof json.file != 'string') { failFun('Invalid JSON: ' + xhr.responseText); return; }
					succFun(http.baseurl + 'upload/' + json.file);
				};
				formData = new FormData();
				formData.append('file', file, file.name);
				xhr.send(formData);
			}
		}, (opt) => { });

		// 提交表单保存
		form.on('submit(*)', function(data) {
			data = data.field;
			// 同步富文本与日期
			data.baogaoxiangqing = tinymce.get('#baogaoxiangqing').getContent();
			if(jquery('#jianchashijian').val()){
				data.jianchashijian = jquery('#jianchashijian').val();
			}

			http.requestJson('jianchabaogao/add', 'post', data, function(res) {
				layer.msg('报告归档成功', { time: 2000, icon: 6 }, function() { back(); });
			});
			return false;
		});

	});
</script>
</body>
</html>
