<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>诊疗详情</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0;
			padding: 0;
			background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.detail-container {
			max-width: 1200px;
			margin: 40px auto;
			padding: 0 20px;
			box-sizing: border-box;
		}

		/* 顶部导航面包屑 */
		.breadcrumb {
			margin-bottom: 25px;
			font-size: 15px;
			color: #64748b;
			display: flex;
			align-items: center;
		}
		.breadcrumb a {
			color: #475569;
			text-decoration: none;
			transition: color 0.3s;
		}
		.breadcrumb a:hover { color: #008476; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		/* 顶部核心信息展示块（左图右文） */
		.info-block {
			background: #ffffff;
			border-radius: 20px;
			padding: 30px;
			display: flex;
			gap: 40px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
			margin-bottom: 30px;
		}

		/* 左侧图片区域 */
		.img-area {
			flex: 0 0 450px;
			height: 350px;
			border-radius: 12px;
			overflow: hidden;
			background: #f8fafc;
			box-shadow: 0 4px 15px rgba(0,0,0,0.05);
		}
		.img-area img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		/* 右侧信息区域 */
		.text-area {
			flex: 1;
			display: flex;
			flex-direction: column;
		}

		.main-title {
			font-size: 28px;
			color: #1e293b;
			font-weight: bold;
			margin: 0 0 15px 0;
			line-height: 1.3;
		}

		/* 价格区域特别醒目 */
		.price-wrap {
			background: #fef2f2;
			padding: 15px 20px;
			border-radius: 8px;
			margin-bottom: 25px;
			display: inline-block;
		}
		.price-label { font-size: 14px; color: #ef4444; margin-right: 5px; }
		.price-val { font-size: 26px; color: #ef4444; font-weight: bold; }

		/* 属性列表块 */
		.attr-list {
			background: #f8fafc;
			border-radius: 12px;
			padding: 20px 25px;
			display: flex;
			flex-direction: column;
			gap: 15px;
		}

		.attr-item {
			display: flex;
			font-size: 15px;
		}
		.attr-item .label {
			color: #64748b;
			width: 90px;
			flex-shrink: 0;
		}
		.attr-item .val {
			color: #334155;
			font-weight: 500;
		}

		/* 操作按钮区 */
		.action-area {
			margin-top: auto; /* 推到底部 */
			padding-top: 20px;
			display: flex;
			gap: 15px;
		}

		.btn-primary {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%);
			color: white;
			border: none;
			padding: 0 35px;
			height: 48px;
			border-radius: 8px;
			font-size: 16px;
			font-weight: 500;
			cursor: pointer;
			box-shadow: 0 4px 15px rgba(0, 132, 118, 0.3);
			transition: all 0.3s;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.btn-primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(0, 132, 118, 0.4);
			color: white;
		}

		/* 底部详情长文卡片 */
		.content-card {
			background: #ffffff;
			border-radius: 20px;
			padding: 40px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
		}

		.section-title {
			font-size: 20px;
			color: #1e293b;
			font-weight: 600;
			margin-bottom: 25px;
			padding-bottom: 15px;
			border-bottom: 1px solid #e2e8f0;
			display: flex;
			align-items: center;
		}
		.section-title::before {
			content: '';
			display: block;
			width: 4px;
			height: 18px;
			background: #008476;
			border-radius: 2px;
			margin-right: 10px;
		}

		/* 富文本内容格式化 */
		.rich-text-content {
			font-size: 16px;
			line-height: 1.8;
			color: #334155;
		}
		.rich-text-content img {
			max-width: 100%;
			border-radius: 8px;
			margin: 15px 0;
		}
		.rich-text-content p {
			margin-bottom: 15px;
		}

		@media (max-width: 900px) {
			.info-block { flex-direction: column; }
			.img-area { flex: auto; height: auto; aspect-ratio: 4/3; }
		}
	</style>
</head>
<body>
<div id="app" class="detail-container">

	<div class="breadcrumb">
		<a href="javascript:window.history.back();"><i class="layui-icon layui-icon-left"></i> 返回列表</a>
		<span>/</span>
		诊疗详情
	</div>

	<div class="info-block">
		<div class="img-area">
			<img :src="detail.tupian ? baseurl + detail.tupian.split(',')[0] : '../../layui/images/face/0.gif'" alt="诊疗图片">
		</div>

		<div class="text-area">
			<h1 class="main-title">{{title}}</h1>

			<div class="price-wrap" v-if="detail.feiyong">
				<span class="price-label">参考价格</span>
				<span class="price-val">￥{{detail.feiyong}}</span>
			</div>

			<div class="attr-list">
				<div class="attr-item" v-if="detail.xiangmufenlei">
					<div class="label">诊疗分类：</div>
					<div class="val">{{detail.xiangmufenlei}}</div>
				</div>
				<div class="attr-item" v-if="detail.keshi">
					<div class="label">所属科室：</div>
					<div class="val">{{detail.keshi}}</div>
				</div>
			</div>

			<div class="action-area">
				<button v-if="isAuth('xiangmuxinxi','预约')" @click="onAcrossTap('yuyuexinxi','','','')" type="button" class="btn-primary">
					<i class="layui-icon layui-icon-form" style="margin-right: 5px;"></i> 立即预约
				</button>
			</div>
		</div>
	</div>

	<div class="content-card">
		<div class="section-title">诊疗详情介绍</div>
		<div class="rich-text-content" v-html="detail.xiangmujieshao">
		</div>
	</div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			// 轮播图
			swiperList: [],
			// 数据详情
			detail: {
				id: 0
			},
			// 商品标题
			title: '',
			// 倒计时
			count: 0,
			// 加入购物车数量
			buynumber: 1,
			// 当前详情页表
			detailTable: 'xiangmuxinxi',
			baseurl: '',
			// 评论列表
			dataList: [],
			// 选座座位列表
			numberList: []
		},
		// 倒计时效果
		computed: {
			SecondToDate: function() {
				var time = this.count;
				if (null != time && "" != time) {
					if (time > 60 && time < 60 * 60) {
						time = parseInt(time / 60.0) + "分钟" + parseInt((parseFloat(time / 60.0) - parseInt(time / 60.0)) * 60) + "秒";
					} else if (time >= 60 * 60 && time < 60 * 60 * 24) {
						time = parseInt(time / 3600.0) + "小时" + parseInt((parseFloat(time / 3600.0) - parseInt(time / 3600.0)) * 60) + "分钟" +
								parseInt((parseFloat((parseFloat(time / 3600.0) - parseInt(time / 3600.0)) * 60) -
										parseInt((parseFloat(time / 3600.0) - parseInt(time / 3600.0)) * 60)) * 60) + "秒";
					} else if (time >= 60 * 60 * 24) {
						time = parseInt(time / 3600.0 / 24) + "天" + parseInt((parseFloat(time / 3600.0 / 24) - parseInt(time / 3600.0 / 24)) * 24) + "小时" + parseInt((parseFloat(time / 3600.0) - parseInt(time / 3600.0)) * 60) + "分钟" +
								parseInt((parseFloat((parseFloat(time / 3600.0) - parseInt(time / 3600.0)) * 60) -
										parseInt((parseFloat(time / 3600.0) - parseInt(time / 3600.0)) * 60)) * 60) + "秒";
					} else {
						time = parseInt(time) + "秒";
					}
				}
				return time;
			}
		},
		//  清除定时器
		destroyed: function() {
			window.clearInterval(this.inter);
		},
		methods: {
			jump(url) {
				jump(url)
			},
			isAuth(tablename, button) {
				return isFrontAuth(tablename, button)
			},
			// 跨表
			onAcrossTap(tableName, crossOptAudit, statusColumnName, tips, statusColumnValue) {
				localStorage.setItem('crossTable', `xiangmuxinxi`);
				localStorage.setItem('crossObj', JSON.stringify(this.detail));
				localStorage.setItem('statusColumnName', statusColumnName);
				localStorage.setItem('statusColumnValue', statusColumnValue);
				localStorage.setItem('tips', tips);
				if(statusColumnName!=''&&!statusColumnName.startsWith("[")) {
					var obj = JSON.parse(localStorage.getItem('crossObj'));
					for (var o in obj){
						if(o==statusColumnName && obj[o]==statusColumnValue){
							layer.msg(tips, {
								time: 2000,
								icon: 5
							});
							return
						}
					}
				}
				jump(`../${tableName}/add.html?corss=true`);
			},
		}
	});

	layui.use(['layer', 'form', 'element', 'carousel', 'http', 'jquery', 'laypage'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var form = layui.form;
		var carousel = layui.carousel;
		var http = layui.http;
		var jquery = layui.jquery;
		var laypage = layui.laypage;

		var limit = 10;

		// 数据ID
		var id = http.getParam('id');
		vue.detail.id = id;
		vue.baseurl = http.baseurl;

		// 商品信息
		http.request(`${vue.detailTable}/detail/` + id, 'get', {}, function(res) {
			// 详情信息
			vue.detail = res.data;
			vue.title = vue.detail.xiangmumingcheng;

			// 处理图片路径，防止缺失 baseurl
			if(vue.detail.tupian && vue.detail.tupian.indexOf('http') == -1) {
				vue.detail.tupian = vue.detail.tupian.replace(http.baseurl,"");
			}

			// 处理富文本里的图片路径问题
			if(vue.detail.xiangmujieshao) {
				vue.detail.xiangmujieshao = vue.detail.xiangmujieshao.replace(/src="upload\//g, 'src="' + vue.baseurl + 'upload/');
			}

			// 轮播图片
			if(vue.detail.tupian){
				var tupianArr = vue.detail.tupian.split(',');
				for (var i = 0; i < tupianArr.length; i++) {
					vue.swiperList.push(tupianArr[i]);
				}
			}

			// 渲染轮播图（如果页面上未来需要使用多图轮播的话保留此逻辑）
			vue.$nextTick(() => {
				carousel.render({
					elem: '#swiper',
					width: '400px',
					height: '400px',
					arrow: 'hover',
					anim: 'default',
					autoplay: 'true',
					interval: '3000',
					indicator: 'inside'
				});
			});
		});
	});
</script>
</body>
</html>
