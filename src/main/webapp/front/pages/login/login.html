<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>登录 - 社区诊疗健康档案管理系统</title>
    <link rel="stylesheet" type="text/css" href="../../layui/css/layui.css">
    <style type="text/css">
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #eef2f5;
            overflow: hidden;
        }

        /* 动态光斑背景，营造高级环境光氛围 */
        .ambient-bg {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
            background: linear-gradient(120deg, #f0f4f8 0%, #d9e2e8 100%);
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 15s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: 10%; width: 50vw; height: 50vw; background: #a1c4fd; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #c2e9fb; animation-delay: -5s; }
        .blob-3 { top: 30%; left: 60%; width: 30vw; height: 30vw; background: #8fd3f4; opacity: 0.4; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 10%) scale(1.1); }
        }

        /* 居中容器 */
        .login-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* 极致毛玻璃登录卡片 */
        .login-form {
            box-sizing: border-box;
            padding: 50px 50px;
            width: 480px;
            max-width: 90%;
            /* 毛玻璃参数 */
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        .login-form:hover {
            transform: translateY(-5px);
        }

        .header-title {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-title h1 {
            font-size: 26px;
            color: #1a2b3c;
            font-weight: 600;
            letter-spacing: 2px;
            margin: 0;
        }
        .header-title p {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
        }

        /* 输入框高级样式 */
        .layui-form-item {
            margin-bottom: 25px;
            position: relative;
        }

        /* 输入框内的图标 */
        .layui-form-item .layui-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
            z-index: 2;
            transition: color 0.3s;
        }

        .layui-input {
            width: 100%;
            height: 52px;
            padding-left: 45px !important; /* 给图标留空间 */
            border-radius: 12px;
            font-size: 15px;
            color: #334155;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02) inset;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .layui-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #008476;
            box-shadow: 0 0 0 4px rgba(0, 132, 118, 0.15);
        }

        .layui-input:focus + .layui-icon {
            color: #008476; /* 聚焦时图标变色 */
        }

        /* 单选框美化 */
        .role-radios {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-radios .layui-form-radio {
            margin: 0;
            padding-right: 15px;
        }

        .role-radios .layui-form-radio>i {
            color: #cbd5e1;
            font-size: 20px;
        }
        .role-radios .layui-form-radioed>i {
            color: #008476 !important;
        }
        .role-radios .layui-form-radio>div {
            color: #475569;
        }
        .role-radios .layui-form-radioed>div {
            color: #008476 !important;
            font-weight: bold;
        }

        /* 登录按钮高级悬停 */
        .btn-login {
            width: 100%;
            height: 52px;
            line-height: 52px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00b4db 0%, #008476 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 132, 118, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 132, 118, 0.45);
        }

        /* 底部注册链接 */
        .links {
            margin-top: 25px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .links a {
            color: #64748b;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #008476;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div id="app" class="login-container">
    <form class="layui-form login-form">
        <div class="header-title">
            <h1>欢迎登录</h1>
            <p>社区诊疗与健康档案管理系统</p>
        </div>

        <div class="layui-form-item">
            <input type="text" name="username" required lay-verify="required" placeholder="请输入账号" autocomplete="off" class="layui-input">
            <i class="layui-icon layui-icon-username"></i>
        </div>

        <div class="layui-form-item">
            <input type="password" name="password" required lay-verify="required" placeholder="请输入密码" autocomplete="off" class="layui-input">
            <i class="layui-icon layui-icon-password"></i>
        </div>

        <div v-if="roles.length>1" class="layui-form-item role-radios">
            <input v-for="(item,index) in roles" :key="index" type="radio" name="role" id="role" :value="item.tableName" :title="item.roleName">
        </div>

        <button class="btn-login" lay-submit lay-filter="login">登录系统</button>

        <div class="links">
            <a v-if="item.hasFrontRegister=='是'" v-for="(item,index) in menu" :key="index" :href="'javascript:registerClick(\''+item.tableName+'\')'">
                注册 {{item.roleName.replace('注册','')}}
            </a>
        </div>
    </form>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script type="text/javascript">
    var vue = new Vue({
        el: '#app',
        data: {
            menu: menu,
            roles: []
        },
        created(){
            for(let item in this.menu) {
                if(this.menu[item].hasFrontLogin=='是') {
                    this.roles.push(this.menu[item]);
                }
            }
        }
    });

    layui.use(['layer', 'element', 'form', 'http', 'jquery'], function() {
        var layer = layui.layer;
        var form = layui.form;
        var http = layui.http;
        var jquery = layui.jquery;

        form.on('submit(login)', function(data) {
            data = data.field;
            if (vue.roles.length != 1) {
                if (!data.role) {
                    layer.msg('请选择登录用户类型', { time: 2000, icon: 5 });
                    return false;
                }
            } else {
                data.role = vue.roles[0].tableName;
            }

            http.request(data.role + '/login', 'get', data, function(res) {
                layer.msg('登录成功', { time: 2000, icon: 6 });
                localStorage.setItem('Token', res.token);
                var roleName = "";
                if(typeof(jquery('#role:checked').attr('title')) == "undefined") {
                    roleName = vue.roles[0].roleName;
                } else {
                    roleName = jquery('#role:checked').attr('title');
                }
                localStorage.setItem('role', roleName);
                localStorage.setItem('userTable', data.role);
                localStorage.setItem('sessionTable', data.role);
                localStorage.setItem('adminName', data.username);

                http.request(data.role + '/session', 'get', {}, function(res) {
                    localStorage.setItem('userid', res.data.id);
                    if(res.data.vip) {
                        localStorage.setItem('vip', res.data.vip);
                    }
                    window.location.href = '../../index.html';
                })
            });
            return false;
        });
    });

    function registerClick(tablename) {
        window.location.href = '../' + tablename + '/register.html?tablename=' + tablename;
    }
</script>
</body>
</html>
