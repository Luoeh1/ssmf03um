<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>诊疗管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../layui/css/layui.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #f3fbfa 0%, #f8fafc 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        .page-wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 38px 20px 54px;
            box-sizing: border-box;
        }
        .hero {
            background: linear-gradient(135deg, #06b6d4 0%, #0f766e 100%);
            border-radius: 28px;
            padding: 34px 36px;
            color: #fff;
            box-shadow: 0 18px 44px rgba(15, 23, 42, 0.10);
        }
        .hero h1 {
            margin: 0 0 12px;
            font-size: 32px;
            font-weight: 700;
        }
        .hero p {
            margin: 0;
            max-width: 760px;
            line-height: 1.9;
            font-size: 14px;
            opacity: 0.96;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 22px;
            margin-top: 28px;
        }
        .entry-card {
            background: #fff;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.9);
        }
        .entry-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .entry-badge.home {
            background: #ecfeff;
            color: #0f766e;
        }
        .entry-badge.clinic {
            background: #eef2ff;
            color: #4338ca;
        }
        .entry-card h2 {
            margin: 0 0 12px;
            font-size: 24px;
            color: #0f172a;
        }
        .entry-card p {
            margin: 0 0 18px;
            color: #475569;
            line-height: 1.9;
            font-size: 14px;
            min-height: 78px;
        }
        .feature-list {
            margin: 0 0 22px;
            padding: 0;
            list-style: none;
        }
        .feature-list li {
            color: #64748b;
            font-size: 13px;
            line-height: 1.9;
        }
        .action-btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .action-btn.home {
            background: linear-gradient(135deg, #06b6d4 0%, #0f766e 100%);
            box-shadow: 0 12px 24px rgba(15, 118, 110, 0.20);
        }
        .action-btn.clinic {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            box-shadow: 0 12px 24px rgba(67, 56, 202, 0.20);
        }
        .tips {
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 16px 20px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.9;
        }
        @media (max-width: 768px) {
            .hero {
                padding: 26px 22px;
            }
            .entry-card {
                padding: 22px;
            }
            .entry-card p {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="hero">
        <h1>诊疗管理</h1>
    </div>

    <div class="card-grid">
        <div class="entry-card">
            <div class="entry-badge home"><i class="layui-icon layui-icon-home"></i> 社区到家服务</div>
            <h2>预约上门</h2>
            <ul class="feature-list">
                <li>适合老年体检、慢病随访、孕产妇社区回访</li>
                <li>支持选择社区医生与上门时间</li>
            </ul>
            <button type="button" class="action-btn home" onclick="jump('../yuyuexinxi/add.html')">进入预约上门</button>
        </div>

        <div class="entry-card">
            <div class="entry-badge clinic"><i class="layui-icon layui-icon-form"></i> 诊疗流程</div>
            <h2>诊疗预约</h2>
            <ul class="feature-list">
                <li>浏览诊疗项目、分类、科室和费用信息</li>
                <li>查看诊疗详情后继续完成预约</li>
            </ul>
            <button type="button" class="action-btn clinic" onclick="jump('../xiangmuxinxi/list.html')">进入诊疗预约</button>
        </div>
    </div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
</body>
</html>
