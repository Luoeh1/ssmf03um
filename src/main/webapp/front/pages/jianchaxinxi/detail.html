<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>检查诊疗详情</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.detail-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; box-sizing: border-box; }

		.breadcrumb { margin-bottom: 25px; font-size: 15px; color: #64748b; display: flex; align-items: center; }
		.breadcrumb a { color: #475569; text-decoration: none; transition: color 0.3s; }
		.breadcrumb a:hover { color: #008476; }
		.breadcrumb span { margin: 0 10px; color: #cbd5e1; }

		/* 顶部信息块 */
		.info-block {
			background: #ffffff; border-radius: 20px; padding: 30px; display: flex; gap: 40px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); margin-bottom: 30px;
		}

		.img-area {
			flex: 0 0 450px; height: 350px; border-radius: 12px; overflow: hidden;
			background: #f8fafc; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
		}
		.img-area img { width: 100%; height: 100%; object-fit: cover; }

		.text-area { flex: 1; display: flex; flex-direction: column; }
		.main-title { font-size: 28px; color: #1e293b; font-weight: bold; margin: 0 0 15px 0; line-height: 1.3; }

		.price-wrap {
			background: #fef2f2; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; display: inline-block;
		}
		.price-label { font-size: 14px; color: #ef4444; margin-right: 5px; }
		.price-val { font-size: 26px; color: #ef4444; font-weight: bold; }

		.attr-list {
			background: #f8fafc; border-radius: 12px; padding: 20px 25px; display: flex; flex-direction: column; gap: 15px;
		}
		.attr-item { display: flex; font-size: 15px; }
		.attr-item .label { color: #64748b; width: 90px; flex-shrink: 0; }
		.attr-item .val { color: #334155; font-weight: 500; }

		/* 底部操作区 */
		.action-area { margin-top: auto; padding-top: 20px; display: flex; gap: 15px; }
		.btn-primary {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 35px;
			height: 48px; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer;
			box-shadow: 0 4px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s; display: flex; align-items: center; justify-content: center;
		}
		.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 132, 118, 0.4); color: white;}

		/* 下部详情块 */
		.content-card { background: #ffffff; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); }
		.section-title { font-size: 20px; color: #1e293b; font-weight: 600; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; }
		.section-title::before { content: ''; display: block; width: 4px; height: 18px; background: #008476; border-radius: 2px; margin-right: 10px; }

		.rich-text-content { font-size: 16px; line-height: 1.8; color: #334155; }
		.rich-text-content img { max-width: 100%; border-radius: 8px; margin: 15px 0; }

		@media (max-width: 900px) {
			.info-block { flex-direction: column; }
			.img-area { flex: auto; height: auto; aspect-ratio: 4/3; }
		}
	</style>
</head>
<body>
<div id="app" class="detail-container">

	<div class="breadcrumb">
		<a href="javascript:window.history.back();"><i class="layui-icon layui-icon-left"></i> 返回</a>
		<span>/</span>
		检查诊疗详情
	</div>

	<div class="info-block">
		<div class="img-area">
			<img :src="detail.tupian ? baseurl + detail.tupian.split(',')[0] : (detail.jianchatupian ? baseurl + detail.jianchatupian.split(',')[0] : '../../layui/images/face/0.gif')">
		</div>

		<div class="text-area">
			<h1 class="main-title">{{detail.jianchamingcheng || detail.jianchaxiangmu}}</h1>

			<div class="price-wrap" v-if="detail.jiage || detail.jianchajiage">
				<span class="price-label">检查费用</span>
				<span class="price-val">￥{{detail.jiage || detail.jianchajiage}}</span>
			</div>

			<div class="attr-list">
				<div class="attr-item" v-if="detail.jianchabianhao">
					<div class="label">检查编号：</div>
					<div class="val">{{detail.jianchabianhao}}</div>
				</div>
				<div class="attr-item" v-if="detail.jianchaxiangmu">
					<div class="label">诊疗分类：</div>
					<div class="val">{{detail.jianchaxiangmu}}</div>
				</div>
				<div class="attr-item" v-if="detail.jianchadidian">
					<div class="label">检查地点：</div>
					<div class="val">{{detail.jianchadidian}}</div>
				</div>
				<div class="attr-item" v-if="detail.zhuyishixiang">
					<div class="label">注意事项：</div>
					<div class="val" style="color: #ef4444;">{{detail.zhuyishixiang}}</div>
				</div>
			</div>

			<div class="action-area">
				<button v-if="isAuth('jianchaxinxi','预约检查') || isAuth('jianchaxinxi','预约')" @click="onAcrossTap('yuyuejiancha','','','')" type="button" class="btn-primary">
					<i class="layui-icon layui-icon-form" style="margin-right: 5px;"></i> 立即预约
				</button>
			</div>
		</div>
	</div>

	<div class="content-card">
		<div class="section-title">检查诊疗详情</div>
		<div class="rich-text-content" v-html="detail.jianchaxiangqing || detail.jianchaneirong || detail.xiangqing">
		</div>
	</div>

</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: { id: 0 },
			detailTable: 'jianchaxinxi',
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			isAuth(tablename, button) { return isFrontAuth(tablename, button) },
			// 跨表
			onAcrossTap(tableName, crossOptAudit, statusColumnName, tips, statusColumnValue) {
				localStorage.setItem('crossTable', `jianchaxinxi`);
				localStorage.setItem('crossObj', JSON.stringify(this.detail));
				localStorage.setItem('statusColumnName', statusColumnName);
				localStorage.setItem('statusColumnValue', statusColumnValue);
				localStorage.setItem('tips', tips);
				jump(`../${tableName}/add.html?corss=true`);
			},
		}
	});

	layui.use(['layer', 'http', 'jquery'], function() {
		var layer = layui.layer;
		var http = layui.http;
		var jquery = layui.jquery;

		var id = http.getParam('id');
		vue.detail.id = id;
		vue.baseurl = http.baseurl;

		http.request(`${vue.detailTable}/detail/` + id, 'get', {}, function(res) {
			vue.detail = res.data;
			// 清洗图片路径
			if(vue.detail.tupian && vue.detail.tupian.indexOf('http') == -1) {
				vue.detail.tupian = vue.detail.tupian.replace(http.baseurl,"");
			}
			if(vue.detail.jianchatupian && vue.detail.jianchatupian.indexOf('http') == -1) {
				vue.detail.jianchatupian = vue.detail.jianchatupian.replace(http.baseurl,"");
			}

			// 处理富文本里的图片路径
			let rContent = vue.detail.jianchaxiangqing || vue.detail.jianchaneirong || vue.detail.xiangqing;
			if(rContent) {
				rContent = rContent.replace(/src="upload\//g, 'src="' + vue.baseurl + 'upload/');
				if(vue.detail.jianchaxiangqing) vue.detail.jianchaxiangqing = rContent;
				if(vue.detail.jianchaneirong) vue.detail.jianchaneirong = rContent;
				if(vue.detail.xiangqing) vue.detail.xiangqing = rContent;
			}
		});
	});
</script>
</body>
</html>
