<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>发布检查诊疗</title>
	<link rel="stylesheet" href="../../layui/css/layui.css">
	<style>
		body, html {
			margin: 0; padding: 0; background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
			min-height: 100vh;
		}

		.add-container {
			max-width: 850px; margin: 40px auto; background: #ffffff; border-radius: 20px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); padding: 40px 50px; box-sizing: border-box;
		}

		.page-title {
			font-size: 24px; color: #1e293b; font-weight: 600; margin-bottom: 30px; text-align: center;
			letter-spacing: 1px; position: relative; padding-bottom: 15px;
		}
		.page-title::after {
			content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
			width: 40px; height: 4px; background: linear-gradient(90deg, #00b4db, #008476); border-radius: 2px;
		}

		.layui-form-item { margin-bottom: 22px; }
		.layui-form-label { width: 110px; padding: 12px 15px 12px 0; font-size: 15px; color: #475569; font-weight: 500; }
		.layui-input-block { margin-left: 125px; }

		.layui-input, .layui-textarea, .layui-select {
			border-radius: 10px !important; border: 1px solid #e2e8f0; background-color: #f8fafc; color: #334155;
			padding-left: 15px; transition: all 0.3s;
		}
		.layui-textarea { min-height: 80px; padding: 15px; line-height: 1.6; }
		.layui-input:focus, .layui-textarea:focus { background-color: #ffffff; border-color: #008476; box-shadow: 0 0 0 3px rgba(0, 132, 118, 0.1); }

		.layui-input[readonly], .layui-textarea[readonly], .layui-input[disabled] {
			background-color: #eef2f5 !important; color: #94a3b8; cursor: not-allowed; border-color: #e2e8f0 !important;
		}

		/* 图片上传区 */
		.upload-area {
			border: 2px dashed #cbd5e1; border-radius: 12px; padding: 15px; text-align: center;
			background: #f8fafc; transition: all 0.3s; display: inline-block; min-width: 200px;
		}
		.upload-area:hover { border-color: #008476; background: #f0fdfa; }
		.upload-preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 10px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);}
		.btn-upload-pic { background: #ffffff; border: 1px solid #008476; color: #008476; padding: 0 20px; height: 38px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
		.btn-upload-pic:hover { background: rgba(0, 132, 118, 0.05); transform: translateY(-2px); }

		.btn-container { text-align: center; margin-top: 40px; }
		.btn-submit {
			background: linear-gradient(135deg, #00b4db 0%, #008476 100%); color: white; border: none; padding: 0 45px;
			height: 50px; border-radius: 10px; font-size: 16px; font-weight: 600; letter-spacing: 2px; cursor: pointer;
			box-shadow: 0 6px 15px rgba(0, 132, 118, 0.3); transition: all 0.3s; display: inline-block;
		}
		.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 132, 118, 0.4); }
		.btn-back {
			background: #ffffff; color: #64748b; border: 1px solid #cbd5e1; padding: 0 35px; height: 50px;
			border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s; margin-left: 20px; display: inline-block;
		}
		.btn-back:hover { color: #1e293b; border-color: #94a3b8; background: #f8fafc; }

		@media (max-width: 768px) {
			.add-container { margin: 20px; padding: 30px 20px; }
			.layui-form-label { display: block; text-align: left; width: 100%; padding-bottom: 5px; }
			.layui-input-block { margin-left: 0; }
			.btn-back { margin-left: 0; margin-top: 15px; display: block; width: 100%; }
			.btn-submit { display: block; width: 100%; }
		}
	</style>
</head>
<body>

<div id="app">
	<div class="add-container">
		<div class="page-title">发布或编辑检查信息</div>
		<form class="layui-form layui-form-pane" lay-filter="myForm">

			<div class="layui-form-item" pane>
				<label class="layui-form-label">检查编号：</label>
				<div class="layui-input-block">
					<input v-model="detail.jianchabianhao" type="text" :readonly="ro.jianchabianhao" name="jianchabianhao" id="jianchabianhao" autocomplete="off" class="layui-input">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗名称：</label>
				<div class="layui-input-block">
					<input v-model="detail.jianchamingcheng" type="text" :readonly="ro.jianchamingcheng" name="jianchamingcheng" id="jianchamingcheng" autocomplete="off" class="layui-input" placeholder="输入检查名称(如:全身体检套餐)" lay-verify="required">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗类别：</label>
				<div class="layui-input-block">
					<input v-model="detail.jianchaxiangmu" type="text" :readonly="ro.jianchaxiangmu" name="jianchaxiangmu" id="jianchaxiangmu" autocomplete="off" class="layui-input" placeholder="输入所属分类或科室">
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">诊疗宣传图：</label>
				<div class="layui-input-block">
					<div class="upload-area">
						<button type="button" class="btn-upload-pic" id="tupianUpload">
							<i class="layui-icon layui-icon-upload-drag"></i> 上传图片
						</button>
						<input type="hidden" id="tupian" name="tupian" v-model="detail.tupian" />
						<input type="hidden" id="jianchatupian" name="jianchatupian" v-model="detail.jianchatupian" />
						<div>
							<img id="tupianImg" class="upload-preview" src="">
						</div>
					</div>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">检查费用：</label>
				<div class="layui-input-block">
					<input v-model="detail.jiage" type="text" :readonly="ro.jiage" name="jiage" id="jiage" autocomplete="off" class="layui-input" placeholder="输入费用(元)">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">检查地点：</label>
				<div class="layui-input-block">
					<input v-model="detail.jianchadidian" type="text" :readonly="ro.jianchadidian" name="jianchadidian" id="jianchadidian" autocomplete="off" class="layui-input" placeholder="具体科室位置/房间号">
				</div>
			</div>
			<div class="layui-form-item" pane>
				<label class="layui-form-label">注意事项：</label>
				<div class="layui-input-block">
					<textarea v-model="detail.zhuyishixiang" name="zhuyishixiang" id="zhuyishixiang" class="layui-textarea" placeholder="例如：需空腹、不能喝水等..."></textarea>
				</div>
			</div>

			<div class="layui-form-item" pane>
				<label class="layui-form-label">详细介绍：</label>
				<div class="layui-input-block">
					<textarea name="xiangqing" id="xiangqing">请输入详细的服务介绍...</textarea>
				</div>
			</div>

			<div class="btn-container">
				<button class="btn-submit" lay-submit lay-filter="*">保存提交</button>
				<button type="button" class="btn-back" @click="back()">返回</button>
			</div>
		</form>
	</div>
</div>

<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/validate.js"></script>

<script>
	var vue = new Vue({
		el: '#app',
		data: {
			detail: {
				jianchabianhao: genTradeNo(),
				jianchamingcheng: '',
				jianchaxiangmu: '',
				tupian: '',
				jianchatupian: '',
				jiage: '',
				jianchajiage: '',
				jianchadidian: '',
				zhuyishixiang: '',
				xiangqing: '',
				jianchaxiangqing: '',
				jianchaneirong: ''
			},
			ro:{
				jianchabianhao : false,
				jianchamingcheng : false,
				jianchaxiangmu : false,
				tupian : false,
				jianchatupian : false,
				jiage : false,
				jianchajiage: false,
				jianchadidian : false,
				zhuyishixiang : false,
				xiangqing : false,
				jianchaxiangqing : false,
				jianchaneirong : false
			},
			baseurl: ''
		},
		methods: {
			jump(url) { jump(url) },
			back() { window.history.back(); }
		}
	})

	layui.use(['layer', 'element', 'http', 'jquery', 'form', 'upload', 'tinymce'], function() {
		var layer = layui.layer;
		var element = layui.element;
		var http = layui.http;
		var jquery = layui.jquery;
		var form = layui.form;
		var upload = layui.upload;
		var tinymce = layui.tinymce;
		vue.baseurl = http.baseurl;

		// 图片上传组件
		var tupianUpload = upload.render({
			elem: '#tupianUpload',
			url: http.baseurl + 'file/upload',
			headers: { 'Token': localStorage.getItem('Token') },
			accept: 'images',
			before: function() { layer.load(1); },
			done: function(res) {
				layer.closeAll('loading');
				if (res.code == 0) {
					layer.msg("上传成功", { time: 2000, icon: 6 });
					var url = 'upload/' + res.file;
					jquery('#tupian').val(url);
					jquery('#jianchatupian').val(url);
					// 预览
					jquery('#tupianImg').attr('src', http.baseurl + url).css('display', 'inline-block');
					vue.detail.tupian = url;
					vue.detail.jianchatupian = url;
				} else {
					layer.msg(res.msg, { time: 2000, icon: 5 });
				}
			},
			error: function() { layer.closeAll('loading'); layer.msg("请求接口异常", { time: 2000, icon: 5 }); }
		});

		// 跨表数据填充
		if(localStorage.getItem('crossTable')) {
			var crossTable = localStorage.getItem('crossTable');
			var crossObj = JSON.parse(localStorage.getItem('crossObj'));
			for (var o in crossObj){
				if(o=='jianchabianhao'){ vue.detail[o] = crossObj[o]; vue.ro.jianchabianhao = true; continue; }
				if(o=='jianchamingcheng'){ vue.detail[o] = crossObj[o]; vue.ro.jianchamingcheng = true; continue; }
				if(o=='jianchaxiangmu'){ vue.detail[o] = crossObj[o]; vue.ro.jianchaxiangmu = true; continue; }
			}
		}

		// 富文本渲染
		var edit = tinymce.render({
			elem: "#xiangqing",
			height: 400,
			images_upload_handler: function(blobInfo, succFun, failFun) {
				var xhr, formData;
				var file = blobInfo.blob();
				xhr = new XMLHttpRequest();
				xhr.withCredentials = false;
				xhr.open('POST', http.baseurl + 'file/upload');
				xhr.setRequestHeader("Token", localStorage.getItem('Token'));
				xhr.onload = function() {
					var json;
					if (xhr.status != 200) { failFun('HTTP Error: ' + xhr.status); return; }
					json = JSON.parse(xhr.responseText);
					if (!json || typeof json.file != 'string') { failFun('Invalid JSON: ' + xhr.responseText); return; }
					succFun(http.baseurl + 'upload/' + json.file);
				};
				formData = new FormData();
				formData.append('file', file, file.name);
				xhr.send(formData);
			}
		}, (opt) => { });

		// 提交表单保存
		form.on('submit(*)', function(data) {
			data = data.field;
			// 同步富文本数据 (兼容多个可能的字段名)
			var rContent = tinymce.get('#xiangqing').getContent();
			data.xiangqing = rContent;
			data.jianchaxiangqing = rContent;
			data.jianchaneirong = rContent;

			http.requestJson('jianchaxinxi/add', 'post', data, function(res) {
				layer.msg('发布成功', { time: 2000, icon: 6 }, function() { back(); });
			});
			return false;
		});

	});
</script>
</body>
</html>
