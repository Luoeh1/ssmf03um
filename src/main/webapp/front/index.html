<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>社区诊疗与健康档案管理系统</title>
	<link rel="stylesheet" href="./layui/css/layui.css">
	<link rel="stylesheet" href="./xznstatic/css/common.css"/>
	<link rel="stylesheet" href="./xznstatic/css/style.css"/>
	<style>
		html, body {
			height: 100%;
			margin: 0;
			padding:0;
			background-color: #f5f8fa;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
			scroll-behavior: smooth;
		}

		/* 核心修复：iframe固定高度，开启内部滚动，能看到所有内容 */
		#iframe {
			width: 100%;
			margin-top: 80px;
			padding: 0;
			display: block;
			/* 固定高度，内部滚动 */
			height: calc(100vh - 80px);
			border: none;
		}

		#header {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 80px;
			z-index: 1000;
			background: rgba(255, 255, 255, 0.75) !important;
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border-bottom: 1px solid rgba(255, 255, 255, 0.4) !important;
			box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03) !important;
		}

		.nav-container {
			max-width: 1400px;
			height: 100%;
			margin: 0 auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 0 40px;
		}

		.nav-logo {
			display: flex;
			align-items: center;
			text-decoration: none;
			cursor: pointer;
		}

		.nav-logo i {
			font-size: 32px;
			color: #008476;
			margin-right: 12px;
			background: linear-gradient(135deg, #00b4db, #008476);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.nav-title {
			font-size: 22px;
			color: #2c3e50;
			font-weight: 600;
			letter-spacing: 1px;
		}

		.nav-menu ul {
			display: flex;
			margin: 0;
			padding: 0;
			list-style: none;
			align-items: center;
		}

		.nav-menu ul li {
			margin: 0 5px;
			position: relative;
		}

		.nav-menu ul li a {
			display: block;
			padding: 10px 18px;
			color: #5c6b7a;
			font-size: 15px;
			font-weight: 500;
			text-decoration: none;
			border-radius: 12px;
			transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
		}

		.nav-menu ul li:hover a,
		.nav-menu ul li.current a {
			color: #008476;
			background: rgba(0, 132, 118, 0.08);
			transform: translateY(-2px);
		}

		#tabbar {
			display: none; /* 隐藏页脚，不影响内容查看 */
		}
	</style>
</head>
<body>

<div id="header">
	<div class="nav-container">
		<a class="nav-logo" href="javascript:navPage('./pages/home/home.html')">
			<i class="layui-icon layui-icon-heart-fill"></i>
			<div class="nav-title">社区诊疗与健康档案管理系统</div>
		</a>

		<div class="nav-menu">
			<ul>
				<li class='current'><a href="javascript:navPage('./pages/home/home.html')">首页</a></li>
				<li v-for="(item,index) in indexNav" :key="index">
					<a :href="'javascript:navPage(\''+item.url+'\')'">{{item.name}}</a>
				</li>
				<li><a href="javascript:centerPage();">个人中心</a></li>
				<li v-if="Token"><a href="javascript:void(0);" @click="logout()">退出登录</a></li>
				<li v-else><a href="./pages/login/login.html">.html">登录系统</a></li>
				<li><a href="javascript:void(0);" @click="goAdmin()">后台管理</a></li>
			</ul>
		</div>
	</div>
</div>

<!-- 核心修复：开启iframe滚动 -->
<iframe src="./pages/home/home.html" id="iframe" frameborder="0" scrolling="auto"></iframe>

<script src="./xznstatic/js/jquery-1.11.3.min.js"></script>
<script src="./layui/layui.js"></script>
<script src="./js/vue.js"></script>
<script src="./js/config.js"></script>

<script>
	var vue = new Vue({
		el: '#header',
		data: {
			indexNav: indexNav,
			cartFlag: cartFlag,
			adminurl: adminurl,
			chatFlag: chatFlag,
			projectName: projectName,
			Token: localStorage.getItem('Token')
		},
		mounted: function() {
			this.bindClickOnLi();
		},
		methods: {
			bindClickOnLi() {
				let list = document.querySelectorAll(".nav-menu ul li");
				list.forEach(item => {
					item.onclick = function() {
						$(this).addClass("current").siblings().removeClass("current");
					}
				});
			},
			goAdmin() {
				var role = localStorage.getItem('role');
				if (role === '用户') {
					layui.layer.msg('普通用户无权访问后台管理系统！', { icon: 5, time: 2000 });
					return;
				}
				window.open(this.adminurl, '_blank');
			},
			logout() {
				localStorage.clear();
				layui.layer.msg('退出成功', { time: 1000, icon: 6 }, function() {
					window.location.reload();
				});
			}
		}
	});

	// 🔥 点击跳转 + 自动置顶（保留功能）
	function navPage(url) {
		// 切换页面时回到顶部
		document.getElementById('iframe').contentWindow.scrollTo(0,0);
		localStorage.setItem('iframeUrl', url);
		document.getElementById('iframe').src = url;
	}

	function centerPage() {
		var userTable = localStorage.getItem('userTable');
		if (userTable) {
			localStorage.setItem('iframeUrl', './pages/' + userTable + '/center.html');
			document.getElementById('iframe').src = './pages/' + userTable + '/center.html';
			document.getElementById('iframe').contentWindow.scrollTo(0,0);
		} else {
			window.location.href = './pages/login/login.html'
		}
	}

	// 🔥 强制启动进入首页，永不随机
	localStorage.removeItem('iframeUrl');
	document.getElementById('iframe').src = './pages/home/home.html';
</script>
</body>
</html>
