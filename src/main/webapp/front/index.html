<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<title>社区诊疗与健康档案管理系统</title>
	<link rel="stylesheet" href="./layui/css/layui.css">
	<link rel="stylesheet" href="./xznstatic/css/common.css"/>
	<link rel="stylesheet" href="./xznstatic/css/style.css"/>
	<style>
		html, body {
			height: 100%;
			margin: 0;
			background-color: #f5f8fa; /* 极简的浅灰背景 */
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
			scroll-behavior: smooth;
		}

		#iframe {
			width: 100%;
			margin-top: 80px; /* 留出导航栏高度 */
			padding: 0;
			display: block;
			min-height: calc(100vh - 80px - 120px);
			border: none;
		}

		/* 顶部导航栏 - 毛玻璃与居中对齐设计 */
		#header {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 80px;
			z-index: 1000;
			/* 毛玻璃核心代码 */
			background: rgba(255, 255, 255, 0.75) !important;
			backdrop-filter: blur(16px);
			-webkit-backdrop-filter: blur(16px);
			border-bottom: 1px solid rgba(255, 255, 255, 0.4) !important;
			box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03) !important;
		}

		/* PC端内容居中容器 */
		.nav-container {
			max-width: 1400px;
			height: 100%;
			margin: 0 auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 0 40px;
		}

		/* Logo 与 标题 */
		.nav-logo {
			display: flex;
			align-items: center;
			text-decoration: none;
			cursor: pointer;
		}

		.nav-logo i {
			font-size: 32px;
			color: #008476;
			margin-right: 12px;
			background: linear-gradient(135deg, #00b4db, #008476);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.nav-title {
			font-size: 22px;
			color: #2c3e50;
			font-weight: 600;
			letter-spacing: 1px;
		}

		/* 导航菜单区 */
		.nav-menu ul {
			display: flex;
			margin: 0;
			padding: 0;
			list-style: none;
			align-items: center;
		}

		.nav-menu ul li {
			margin: 0 5px;
			position: relative;
		}

		.nav-menu ul li a {
			display: block;
			padding: 10px 18px;
			color: #5c6b7a;
			font-size: 15px;
			font-weight: 500;
			text-decoration: none;
			border-radius: 12px;
			/* 高级悬停动画 */
			transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
		}

		/* 鼠标悬停及选中状态 - 微发光与轻微上浮 */
		.nav-menu ul li:hover a,
		.nav-menu ul li.current a {
			color: #008476;
			background: rgba(0, 132, 118, 0.08);
			transform: translateY(-2px);
		}

		/* 页脚区 - 清新极简风 */
		#tabbar {
			background: #ffffff !important;
			color: #7f8c8d !important;
			padding: 40px 0 !important;
			text-align: center;
			border-top: 1px solid #e1e8ed !important;
			box-shadow: none !important;
		}

		#tabbar div {
			margin: 8px 0 !important;
			font-size: 14px !important;
			color: #95a5a6 !important;
			background: transparent !important;
			border: none !important;
		}
	</style>
</head>
<body>
<div id="header">
	<div class="nav-container">
		<a class="nav-logo" href="javascript:navPage('./pages/home/home.html')">
			<i class="layui-icon layui-icon-heart-fill"></i>
			<div class="nav-title">社区诊疗与健康档案管理系统</div>
		</a>

		<div class="nav-menu">
			<ul>
				<li class='current'><a href="javascript:navPage('./pages/home/home.html')">首页</a></li>
				<li v-for="(item,index) in indexNav" :key="index">
					<a :href="'javascript:navPage(\''+item.url+'\')'">{{item.name}}</a>
				</li>
				<li><a href="javascript:centerPage();">个人中心</a></li>
				<li><a :href="adminurl" target="_blank">后台管理</a></li>
			</ul>
		</div>
	</div>
</div>
<iframe src="./pages/home/home.html" id="iframe" frameborder="0" scrolling="no" onload="changeFrameHeight()"></iframe>

<div id="tabbar">
	<div>版权所有 © 社区诊疗与健康档案管理系统 2026</div>
	<div>科技赋能医疗 · 为您的健康保驾护航</div>
</div>

<script src="./xznstatic/js/jquery-1.11.3.min.js"></script>
<script src="./layui/layui.js"></script>
<script src="./js/vue.js"></script>
<script src="./js/config.js"></script>

<script>
	var vue1 = new Vue({el: '#tabbar'})

	var vue = new Vue({
		el: '#header',
		data: {
			indexNav: indexNav,
			cartFlag: cartFlag,
			adminurl: adminurl,
			chatFlag: chatFlag,
			projectName: projectName,
		},
		mounted: function() {
			this.bindClickOnLi();
		},
		methods: {
			bindClickOnLi() {
				let list = document.querySelectorAll(".nav-menu ul li");
				list.forEach(item => {
					item.onclick = function() {
						$(this).addClass("current").siblings().removeClass("current");
					}
				});
			}
		}
	});

	layui.use(['element','layer'], function() {
		var element = layui.element;
		var layer = layui.layer;
	});

	function navPage(url) {
		localStorage.setItem('iframeUrl', url);
		document.getElementById('iframe').src = url;
	}

	function centerPage() {
		var userTable = localStorage.getItem('userTable');
		if (userTable) {
			localStorage.setItem('iframeUrl', './pages/' + userTable + '/center.html');
			document.getElementById('iframe').src = './pages/' + userTable + '/center.html';
		} else {
			window.location.href = './pages/login/login.html'
		}
	}

	var iframeUrl = localStorage.getItem('iframeUrl');
	document.getElementById('iframe').src = iframeUrl  || './pages/home/home.html';

	setInterval(function(){
		changeFrameHeight();
	}, 200);

	function changeFrameHeight() {
		var iframe = document.getElementById('iframe');
		if (iframe) {
			var iframeWin = iframe.contentWindow || iframe.contentDocument.parentWindow;
			if (iframeWin.document.body) {
				iframe.height = iframeWin.document.body.scrollHeight;
			}
		}
	};

	window.onresize = function() {
		changeFrameHeight();
	}
</script>
</body>
</html>
